<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>連線診斷</title>
  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f5f5f5; margin: 0; padding: 24px; }
    .card { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.hint { color: #888; font-size: 13px; margin: 0 0 20px; }
    .test { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 8px; background: #fafafa; margin-bottom: 12px; }
    .test .mark { font-size: 26px; width: 34px; text-align: center; }
    .test .name { font-weight: 700; }
    .test .detail { font-size: 13px; color: #666; }
    .done { border: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="card">
    <h1>連線診斷</h1>
    <p class="hint">頁面開啟後自動測試，請將整個畫面截圖回傳。</p>
    <div class="test" id="t1"><div class="mark">⏳</div><div><div class="name">方法一（現行）</div><div class="detail" id="d1">測試中…</div></div></div>
    <div class="test" id="t2"><div class="mark">⏳</div><div><div class="name">方法二（新）</div><div class="detail" id="d2">測試中…</div></div></div>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';

    function show(id, ok, msg) {
      var t = document.getElementById('t' + id);
      t.querySelector('.mark').textContent = ok ? '✅' : '❌';
      t.classList.add('done');
      document.getElementById('d' + id).textContent = msg;
    }

    // 方法一：現行 JSONP（script 標籤，帶瀏覽器登入狀態）
    (function () {
      var cb = 'cb_' + Date.now();
      var s = document.createElement('script');
      var timer = setTimeout(function () { cleanup(); show(1, false, '逾時（20 秒無回應）'); }, 20000);
      function cleanup() {
        clearTimeout(timer);
        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
        if (s.parentNode) s.parentNode.removeChild(s);
      }
      window[cb] = function (data) { cleanup(); show(1, true, '連線成功'); };
      s.src = GAS_URL + '?action=verify&t=netcheck&callback=' + cb;
      s.onerror = function () { cleanup(); show(1, false, '載入失敗（帳號狀態被拒）'); };
      document.body.appendChild(s);
    })();

    // 方法二：fetch 匿名（credentials: omit，不帶瀏覽器登入狀態）
    (function () {
      var timer = setTimeout(function () { show(2, false, '逾時（20 秒無回應）'); }, 20000);
      fetch(GAS_URL + '?action=verify&t=netcheck&callback=cb', { credentials: 'omit', redirect: 'follow' })
        .then(function (r) { return r.text(); })
        .then(function (txt) {
          clearTimeout(timer);
          if (txt && txt.indexOf('cb(') !== -1) show(2, true, '連線成功');
          else show(2, false, '回應格式不符：' + String(txt).slice(0, 60));
        })
        .catch(function (err) {
          clearTimeout(timer);
          show(2, false, '失敗（' + (err && err.message ? err.message : err) + '）');
        });
    })();
  </script>
</body>
</html>
