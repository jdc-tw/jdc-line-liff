<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人事異動看板</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
<script src="assets/groups.js"></script>
<style>
  .brand { text-align: center; margin: 0 0 14px; }
  .brand img { width: 100%; max-width: 240px; height: auto; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans TC", sans-serif;
    padding: 20px 16px 40px; font-size: 16px; line-height: 1.6; color: #333;
    background: #f7f7f7; max-width: 480px; margin: 0 auto;
  }
  h1 { font-size: 20px; margin: 0 0 6px; color: #1a1a1a; }
  .who { font-size: 13px; color: #888; margin-bottom: 18px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .rowdate { font-size: 13px; color: #888; margin-bottom: 12px; }
  label { display: block; margin: 0 0 6px; font-size: 14px; color: #555; font-weight: 600; }
  input, select {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: #fafafa; margin-bottom: 14px; -webkit-appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: #06c755; background: #fff; }
  .email-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 14px; }
  .email-row input { margin-bottom: 0; flex: 1; min-width: 0; }
  .email-row .suffix { font-size: 14px; color: #777; white-space: nowrap; }
  .titlefield input { margin-bottom: 4px; }
  .linkbtn { background: none; border: none; color: #06c755; font-size: 13px; padding: 4px 0 10px; cursor: pointer; font-family: inherit; -webkit-appearance: none; width: auto; }
  .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: #06c755; color: #fff; }
  .btn-primary:active { background: #05a847; }
  .msg { padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; display: none; }
  .msg.show { display: block; }
  .msg-ok { background: #e6f9ee; color: #1a7d44; }
  .msg-err { background: #fdecea; color: #b71c1c; }
  .msg-info { background: #e8f0fe; color: #1a56c4; }
  .empty { text-align: center; color: #888; padding: 40px 0; font-size: 15px; }
  .sec { font-size: 15px; color: #666; margin: 28px 0 10px; }
  /* tabs（2026-07-15 員工名冊分頁） */
  .tabs { display: flex; gap: 8px; margin: 0 0 16px; }
  .tabs button { flex: 1; padding: 11px 0; font-size: 16px; font-weight: 700; color: #666;
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; cursor: pointer; font-family: inherit; }
  .tabs button.on { background: #06c755; border-color: #06c755; color: #fff; }
  .r-count { font-size: 15px; color: #666; margin-bottom: 10px; }
  .r-count b { color: #1a1a1a; font-size: 20px; }
  .r-search { margin-bottom: 12px; }
  .st-off { font-size: 12px; padding: 1px 8px; border-radius: 10px; background: #fdecea; color: #b71c1c; margin-left: 8px; }
  .resend { background: none; border: 1px solid #ddd; border-radius: 8px; color: #555; font-size: 13px;
    padding: 4px 10px; cursor: pointer; font-family: inherit; margin-top: 6px; -webkit-appearance: none; }
  .resend-msg { font-size: 13px; margin-top: 4px; }
  .resend-msg.ok { color: #1a7d44; } .resend-msg.err { color: #b71c1c; }
  /* 名冊：依單位收合（同統計看板樣式） */
  .grp { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 8px; overflow: hidden; }
  .grp summary { padding: 13px 14px; cursor: pointer; font-weight: 700; list-style: none; display: flex; align-items: baseline; gap: 8px; font-size: 16px; }
  .grp summary::-webkit-details-marker { display: none; }
  .grp summary::before { content: '▸'; color: #bbb; font-size: 13px; transition: transform .15s; }
  .grp[open] summary::before { transform: rotate(90deg); }
  .grp .cnt { color: #888; font-weight: 400; font-size: 14px; }
  .grp .done-item { padding-left: 30px; }
  /* 名冊：最近 20 筆更新/異動標紅＋更新日期 */
  .grp summary.hot { color: #c62828; }
  .done-name.hot { color: #c62828; }
  .upd { font-size: 12px; color: #c62828; background: #fdecea; padding: 1px 7px; border-radius: 10px; margin-left: 8px; white-space: nowrap; }
  .done-list { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
  .done-item { padding: 12px 14px; border-bottom: 1px solid #eee; }
  .done-item:last-child { border-bottom: none; }
  .done-head { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; gap: 2px 10px; }
  .done-name { font-weight: 700; font-size: 17px; color: #1a1a1a; }
  .done-date { font-size: 14px; color: #999; white-space: nowrap; }
  .done-meta { font-size: 15px; color: #666; margin-top: 3px; word-break: break-word; }
  /* ── 長者友善：放大預設字級（2026-06-26）─────────────────────────────────── */
  body { font-size: 17px; }
  input, select { font-size: 16px; }
  label { font-size: 15px; }
  .empty, .sec { font-size: 16px; }
  .msg, .linkbtn { font-size: 15px; }
  .rowdate, .who { font-size: 14px; }
  .email-row input { min-width: 55%; }
  /* ── 桌機（≥768px）：加寬版面＋再放大字，年長人事友善；手機不受影響 ────────── */
  @media (min-width: 768px) {
    body { max-width: 760px; padding: 32px 24px 60px; font-size: 19px; }
    h1 { font-size: 26px; }
    .who { font-size: 16px; }
    .card { padding: 28px 32px; }
    .rowdate { font-size: 15px; }
    label { font-size: 17px; }
    input, select { font-size: 18px; padding: 12px 14px; }
    .email-row .suffix { font-size: 16px; }
    .btn { font-size: 19px; padding: 15px; }
    .sec { font-size: 19px; }
    .empty { font-size: 18px; }
    .done-item { padding: 16px 20px; }
    .done-name { font-size: 19px; }
    .done-meta { font-size: 16px; }
    .done-date { font-size: 15px; }
    .linkbtn { font-size: 16px; }
    /* 待確認卡：桌機最多兩欄。1 張＝單欄置中；≥2 張＝並排，超過自動換列(2+1…)。
       用 :has 偵測卡片數自動切換，核准後卡片減少也會自動縮回。手機(<768)維持單欄。 */
    #pending { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
    #pending .card { margin-bottom: 0; }
    #pending .empty { grid-column: 1 / -1; }
    #pending:has(.card ~ .card) { grid-template-columns: 1fr 1fr; }
    body:has(#pending .card ~ .card) { max-width: 940px; }
  }
</style></head><body>
<div class="brand"><img src="assets/logo-full.svg" alt="日商日本國土開發股份有限公司台灣分公司"></div>
<div style="text-align:right;margin:-8px 0 8px"><a id="xlink" style="font-size:13px;color:#1a56c4;text-decoration:none" href="#">⇄ 活動紀錄看板</a></div>
<div class="tabs">
  <button id="tabbtn-checkin" class="on" onclick="showTab('checkin')">新人報到</button>
  <button id="tabbtn-roster" onclick="showTab('roster')">員工名冊</button>
  <button id="tabbtn-log" onclick="showTab('log')">異動紀錄</button>
</div>
<div id="tab-checkin">
  <h1>新人報到・核准看板</h1>
  <div id="who" class="who"></div>
  <div id="pending"><div class="empty">載入中…</div></div>
  <div id="doneWrap" style="display:none">
    <h2 class="sec">已核准（近一年）</h2>
    <div id="donelist" class="done-list"></div>
  </div>
</div>
<div id="tab-roster" style="display:none">
  <h1>員工名冊</h1>
  <div id="r-count" class="r-count">載入中…</div>
  <input id="r-search" class="r-search" type="search" placeholder="搜尋姓名／單位／員編…" oninput="filterRoster()">
  <div id="r-list"></div>
</div>
<div id="tab-log" style="display:none">
  <h1>異動紀錄</h1>
  <div class="who">公告異動與資料修正都在這裡，最新在上</div>
  <div id="log-list"></div>
</div>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';
var EMAIL_DOMAIN='@jdc-corpn.com.tw';
var SENTINEL='（找不到，由人事填寫）';   // 新人「找不到」哨兵 → 看板停在請選擇
function getToken(){var m=location.search.match(/[?&]t=([^&]+)/);return m?decodeURIComponent(m[1]):'';}
function jsonp(action,params){return new Promise(function(res){
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  var qs=Object.keys(params||{}).map(function(k){return '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('');
  var s=document.createElement('script');
  s.src=GAS_URL+'?action='+encodeURIComponent(action)+qs+'&callback='+cb;
  var timer=setTimeout(function(){res({ok:false,msg:'連線逾時（伺服器喚醒中），請重新整理再試。'});cleanup();},15000);
  s.onerror=function(){res({ok:false,msg:'連線失敗'});cleanup();};
  function cleanup(){clearTimeout(timer);window[cb]=function(){};s.remove();}
  window[cb]=function(d){res(d);cleanup();};
  document.body.appendChild(s);});}
var TOKEN=getToken();
document.getElementById('xlink').href='stats.html?t='+encodeURIComponent(TOKEN);
function updateBadge(n){
  document.getElementById('tabbtn-checkin').textContent = n>0 ? '新人報到（'+n+'）' : '新人報到';
}
var gOpts={titles:[],units:[]};
function esc(s){return (s==null?'':s).toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function emailPrefix(full){full=(full||'').toString();var i=full.indexOf('@');return i>=0?full.slice(0,i):full;}
function setMsg(el,text,type){el.className='msg show msg-'+(type||'info');el.textContent=text;}

function unitSelectHtml(cur){
  var none='<option value=""'+(cur?'':' selected')+'>── 請選擇 ──</option>';
  return '<select data-k="單位">'+none+jdcGroupedOptions(gOpts.units,'unit',cur)+'</select>';
}
// 職稱欄：分組下拉，最後一項「＋ 手動輸入職稱…」可就地切成鍵盤輸入（附「改用清單選」切回）
function buildTitleField(box, cur){
  function toSelect(val){
    box.innerHTML='<select data-k="職稱">'
      +'<option value=""'+(val?'':' selected')+'>── 請選擇 ──</option>'
      +jdcGroupedOptions(gOpts.titles,'title',val)
      +'<option value="__manual__">＋ 手動輸入職稱…</option></select>';
    var sel=box.querySelector('select');
    sel.onchange=function(){ if(sel.value==='__manual__') toInput(''); };
  }
  function toInput(val){
    box.innerHTML='<input data-k="職稱" type="text" value="'+esc(val||'')+'" placeholder="請輸入職稱">'
      +'<button type="button" class="linkbtn" data-back>↩ 改用清單選</button>';
    box.querySelector('[data-back]').onclick=function(){ toSelect(''); };
    box.querySelector('input').focus();
  }
  toSelect(cur);   // 哨兵「找不到」也保留顯示，讓人事一眼看出是新人按了找不到、需主動補
}

function renderRow(o){
  var d=document.createElement('div');d.className='card';
  d.innerHTML=
    (o['報到日期']?'<div class="rowdate">報到日期：'+esc(o['報到日期'])+'</div>':'')
    +'<label>姓名</label><input data-k="姓名" value="'+esc(o['姓名'])+'">'
    +'<label>單位</label>'+unitSelectHtml(o['單位'])
    +'<label>職稱</label><div class="titlefield" data-tf></div>'
    +'<label>生日</label><input type="date" data-k="生日" value="'+esc(o['生日'])+'">'
    +'<label>公司信箱</label><div class="email-row"><input data-k="email-prefix" value="'+esc(emailPrefix(o['公司信箱']))+'" placeholder="請補上信箱帳號"><span class="suffix">'+EMAIL_DOMAIN+'</span></div>'
    +'<label>員工編號</label><input data-k="員編" value="'+esc(o['員編'])+'" placeholder="請補上員編">'
    +'<div class="msg"></div>'
    +'<button class="btn btn-primary">核准報到</button>';
  buildTitleField(d.querySelector('[data-tf]'), o['職稱']);
  function val(k){var el=d.querySelector('[data-k="'+k+'"]');return el?el.value:'';}
  var msg=d.querySelector('.msg');
  d.querySelector('.btn').onclick=function(){
    if(!val('員編').trim()){setMsg(msg,'請先補員工編號再核准。','err');return;}
    var title=val('職稱').trim();
    if(!title){setMsg(msg,'請選擇或輸入職稱。','err');return;}
    if(title===SENTINEL){setMsg(msg,'職稱仍為「找不到」，請改選或手動輸入正式職稱。','err');return;}
    var pre=emailPrefix(val('email-prefix')).replace(/\s/g,'');
    var email=pre?pre+EMAIL_DOMAIN:'';
    setMsg(msg,'處理中…','info');
    jsonp('approveCheckin',{token:TOKEN,row:o._row,name:val('姓名'),unit:val('單位'),title:title,birth:val('生日'),email:email,empno:val('員編')})
      .then(function(r){
        if(r&&r.ok){
          addDoneItem({'報到日期':o['報到日期'],'姓名':val('姓名'),'單位':val('單位'),'職稱':title,'員編':val('員編')}, true);
          d.remove();
          updateBadge(document.querySelectorAll('#pending .card').length);
          if(!document.querySelector('#pending .card')) document.getElementById('pending').innerHTML='<div class="empty">目前沒有待確認的報到 🎉</div>';
        } else setMsg(msg,(r&&r.msg)||'失敗','err');
      });
  };
  return d;
}

function doneItemHtml(o){
  var meta=[o['單位'],o['職稱'],o['員編']].filter(Boolean).map(esc).join('・');
  var mail=String(o['留存信狀態']||'').trim();
  var badge=mail==='退件終止'?'<span class="st-off">留存信退件終止</span>':'';
  // 重寄留存信：只有帶 _row 的列（載入時來的）才給按鈕；剛核准的列本來就在待寄佇列不需要
  var resend=o._row?'<div><button type="button" class="resend" onclick="requeueMail('+o._row+',this)">↻ 重寄留存信</button><div class="resend-msg"></div></div>':'';
  return '<div class="done-item"><div class="done-head"><span class="done-name">'+esc(o['姓名'])+badge+'</span><span class="done-date">'+esc(o['報到日期']||'')+'</span></div><div class="done-meta">'+meta+'</div>'+resend+'</div>';
}
function requeueMail(row,btn){
  var msg=btn.parentNode.querySelector('.resend-msg');
  if(!confirm('把這位同仁的留存信重新排入寄送？（今日 17:00 自動寄出）'))return;
  msg.textContent='處理中…';msg.className='resend-msg';
  jsonp('requeueCheckinMail',{token:TOKEN,row:row}).then(function(r){
    msg.textContent=(r&&r.msg)||(r&&r.ok?'已排入待寄':'失敗');
    msg.className='resend-msg '+(r&&r.ok?'ok':'err');
  });
}

// ── 員工名冊分頁（2026-07-15；唯讀窄表，生日/信箱刻意不出）───────────────────
var rosterLoaded=false, rosterRows=[], logLoaded=false;
function showTab(t){
  ['checkin','roster','log'].forEach(function(k){
    document.getElementById('tab-'+k).style.display = t===k?'':'none';
    document.getElementById('tabbtn-'+k).className = t===k?'on':'';
  });
  if(t==='roster'&&!rosterLoaded){rosterLoaded=true;loadRoster();}
  if(t==='log'&&!logLoaded){logLoaded=true;loadLog();}
}

// ── 異動紀錄分頁（公告異動＋資料修正，最新在上）──────────────────────────
var CAT_COLOR={'離職':'#b71c1c','調動':'#b26a00','晉升':'#1a7d44','新進':'#1a56c4','資料修正':'#666','整批轉移':'#6d28d9'};
function loadLog(){
  var box=document.getElementById('log-list');
  box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('listHrNotices',{token:TOKEN}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">還沒有任何異動紀錄</div>';return;}
    box.innerHTML='<div class="done-list">'+r.rows.map(function(x){
      var col=CAT_COLOR[x.cat]||'#666';
      var move=x.cat==='資料修正' ? esc(x.note)
        : [x.fromUnit&&(x.fromUnit+(x.fromTitle?' '+x.fromTitle:'')), (x.toUnit||x.toTitle)&&((x.toUnit||'')+(x.toTitle?' '+x.toTitle:''))].filter(Boolean).join(' → ');
      var meta=[move, x.eff?'生效 '+x.eff:'', x.who?'確認人 '+x.who:'', x.appliedAt?'套用 '+x.appliedAt:''].filter(Boolean).join('　');
      return '<div class="done-item"><div class="done-head">'
        +'<span class="done-name"><span style="font-size:12px;font-weight:700;color:#fff;background:'+col+';border-radius:10px;padding:1px 8px;margin-right:8px">'+esc(x.cat)+'</span>'+esc(x.name)+'</span>'
        +'<span class="done-date">'+esc(x.status)+'</span></div>'
        +'<div class="done-meta">'+meta+'<span style="color:#bbb">　'+esc(x.doc)+'</span></div></div>';
    }).join('')+'</div>';
  });
}

// （名冊每列編輯已於 2026-07-15 拿掉：等真實需求再開，維持名冊真實性。後端 action 路由同步下架。）
function loadRoster(){
  document.getElementById('r-list').innerHTML='<div class="empty">載入中…</div>';
  jsonp('getRosterList',{token:TOKEN}).then(function(r){
    if(!r||!r.ok){document.getElementById('r-count').textContent='';document.getElementById('r-list').innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    rosterRows=r.rows||[];
    // 最近 20 筆更新/異動 → 標紅＋顯示更新日期（有 updatedMs 的列，時間新→舊取前 20）
    rosterRows.forEach(function(o){o._recent=false;});
    rosterRows.filter(function(o){return o.updatedMs>0;})
      .sort(function(a,b){return b.updatedMs-a.updatedMs;})
      .slice(0,20).forEach(function(o){o._recent=true;});
    document.getElementById('r-count').innerHTML='在職 <b>'+r.activeCount+'</b> 人（名冊共 '+r.total+' 筆）';
    renderRoster(rosterRows);
  });
}
function rosterItemHtml(o){
  var badge=o.status==='離職'?'<span class="st-off">離職</span>':'';
  var upd=o._recent?'<span class="upd">更新 '+esc(o.updatedAt)+'</span>':'';
  return '<div class="done-item"><div class="done-head"><span class="done-name'+(o._recent?' hot':'')+'">'+esc(o.name)+'</span>'+upd+badge+'<span class="done-date" style="margin-left:auto">'+esc(o.empNo)+'</span></div><div class="done-meta">'+esc(o.title||'')+'</div></div>';
}
// 依單位收合（同統計看板）；搜尋時自動展開所有命中組
function renderRoster(rows, openAll){
  var box=document.getElementById('r-list');
  if(!rows.length){box.innerHTML='<div class="empty">（無符合）</div>';return;}
  var m={},order=[];
  rows.forEach(function(o){var u=o.unit||'（未填單位）';if(!m[u]){m[u]=[];order.push(u);}m[u].push(o);});
  box.innerHTML=order.map(function(u){
    var hot=m[u].some(function(o){return o._recent;});
    return '<details class="grp"'+(openAll?' open':'')+'><summary'+(hot?' class="hot"':'')+'>'+esc(u)+'<span class="cnt">'+m[u].length+' 人</span></summary>'
      +m[u].map(rosterItemHtml).join('')+'</details>';
  }).join('');
}
function filterRoster(){
  var kw=document.getElementById('r-search').value.trim();
  if(!kw){renderRoster(rosterRows,false);return;}
  renderRoster(rosterRows.filter(function(o){return (o.name+o.unit+o.title+o.empNo).indexOf(kw)>=0;}),true);
}
function addDoneItem(o, prepend){
  document.getElementById('doneWrap').style.display='';
  var list=document.getElementById('donelist');
  list.insertAdjacentHTML(prepend?'afterbegin':'beforeend', doneItemHtml(o));
}

function load(){
  document.getElementById('pending').innerHTML='<div class="empty">載入中…</div>';
  // options 與 pending 彼此不相依 → 並行發送，等待時間由「相加」降為「較慢的那個」
  Promise.all([jsonp('getCheckinOptions',{}), jsonp('getCheckinPending',{token:TOKEN})]).then(function(rs){
    var opt=rs[0], r=rs[1];
    if(opt&&(opt.units||opt.titles))gOpts=opt;
    var box=document.getElementById('pending');
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+((r&&r.msg)||'連結無效或已失效。')+'</div>';return;}
    document.getElementById('who').textContent='核准人：'+r.who;
    box.innerHTML='';
    if(!r.rows.length) box.innerHTML='<div class="empty">目前沒有待確認的報到 🎉</div>';
    else r.rows.forEach(function(o){box.appendChild(renderRow(o));});
    updateBadge(r.rows.length);
    var done=r.done||[]; var list=document.getElementById('donelist'); list.innerHTML='';
    if(done.length){ document.getElementById('doneWrap').style.display=''; list.innerHTML=done.map(doneItemHtml).join(''); }
  });
}
load();
</script></body></html>
