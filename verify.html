<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>身分驗證 — 日本國土開發 LINE 平台</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
  <style>
    .brand { margin: 0 0 18px; }
    .brand img { width: 100%; max-width: 240px; height: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      padding: 40px 20px; font-size: 16px; line-height: 1.6; color: #333;
      background: #f7f7f7; max-width: 480px; margin: 0 auto; text-align: center;
    }
    .card { background: #fff; border-radius: 12px; padding: 32px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { color: #555; }
    .ok h1 { color: #1a7d44; }
    .err h1 { color: #b71c1c; }
    .btn {
      display: block; margin-top: 20px; padding: 13px; border-radius: 8px;
      background: #06c755; color: #fff; font-size: 16px; font-weight: 700;
      text-decoration: none; letter-spacing: .02em;
    }
    .btn:active { background: #05a847; }
    /* ── 長者友善：放大預設字級（2026-06-26）── */
    body { font-size: 17px; }
    h1 { font-size: 22px; }
    .btn { font-size: 17px; }
  </style>
</head>
<body>
  <div class="brand"><img src="assets/logo-full.svg" alt="日商日本國土開發股份有限公司台灣分公司"></div>
  <div class="card" id="box">
    <div class="icon">⏳</div>
    <h1>驗證中…</h1>
    <p>正在確認您的身分，請稍候。</p>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';
    var LIFF_LINK = 'https://liff.line.me/2010451233-a781rqsm';

    // fetch + credentials:'omit'＝不帶瀏覽器的 Google 登入狀態。
    // script 標籤 JSONP 會帶帳號 session，登入狀態半殘的電腦會被 Google 拒絕（回 Drive 錯誤頁），
    // 2026-07-24 於失敗現場以 netcheck 探針實證：JSONP 敗、fetch 匿名過。
    function jsonp(action, params, timeoutMs) {
      var qs = Object.keys(params || {}).map(function (k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] == null ? '' : params[k]);
      }).join('&');
      var url = GAS_URL + '?action=' + encodeURIComponent(action) + (qs ? ('&' + qs) : '') + '&callback=cb';
      var ctrl = new AbortController();
      var timer = setTimeout(function () { ctrl.abort(); }, timeoutMs || 30000);
      return fetch(url, { credentials: 'omit', redirect: 'follow', signal: ctrl.signal })
        .then(function (r) { return r.text(); })
        .then(function (txt) {
          clearTimeout(timer);
          var a = txt.indexOf('('), b = txt.lastIndexOf(')');
          if (a === -1 || b === -1) throw new Error('回應格式不符');
          return JSON.parse(txt.slice(a + 1, b));
        })
        .catch(function (err) {
          clearTimeout(timer);
          if (err && err.name === 'AbortError') throw new Error('逾時');
          if (err && err.message === '回應格式不符') throw err;
          throw new Error('網路錯誤');
        });
    }

    function render(ok, title, msg) {
      var box = document.getElementById('box');
      box.className = 'card ' + (ok ? 'ok' : 'err');
      var html = '<div class="icon">' + (ok ? '✅' : '⚠️') + '</div><h1>' + title + '</h1><p>' + msg + '</p>';
      if (ok) {
        // 用「按鈕(使用者點擊)」回 LINE：點擊才會觸發 iOS 的 LINE universal link、開回 LINE app。
        // 不用 JS 自動跳轉——那只會在 Safari 內開 LIFF、反而卡住。
        html += '<a class="btn" href="' + LIFF_LINK + '">回 LINE 填寫出席調查</a>';
        html += '<p style="font-size:13px;color:#999;margin-top:10px">點上方按鈕回 LINE 填寫；或回到 LINE 點剛收到的通知。</p>';
      }
      box.innerHTML = html;
    }

    function getToken() {
      var m = location.search.match(/[?&]t=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : '';
    }

    var t = getToken();
    if (!t) {
      render(false, '驗證失敗', '連結不完整，請重新從 LINE 取得驗證連結。');
    } else {
      jsonp('verify', { t: t }).then(function (res) {
        if (res && res.ok) render(true, '員工身分驗證成功！', (res && res.msg) || '您的 LINE 帳號已完成員工身分驗證。');
        else render(false, '驗證失敗', (res && res.msg) || '連結無效或已過期，請重新從 LINE 取得驗證連結。');
      }).catch(function (err) {
        render(false, '驗證失敗', '連線發生問題（' + (err && err.message ? err.message : err) + '），請稍後再試。');
      });
    }
  </script>
</body>
</html>
