<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
<title>人事資訊看板</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans TC",sans-serif;
    margin:0 auto;padding:20px 16px 48px;max-width:760px;background:#fff;color:#413b31;font-size:15px;line-height:1.6}
  .brand{text-align:center;margin:0 0 14px}.brand img{width:100%;max-width:240px;height:auto}
  h1{font-size:22px;margin:0 0 2px}
  .sub{font-size:13px;color:#a59a8a;margin-bottom:18px}
  .card{background:#fffefb;border:1px solid #ece5d8;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .sec-h{display:flex;align-items:baseline;gap:8px;margin:0 0 12px;border-left:5px solid #bd9670;padding-left:10px}
  .sec-h b{font-size:16px}
  .sec-h small{color:#a59a8a;font-size:12px}
  /* KPI row */
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .kpi{flex:1 1 30%;background:#fffefb;border:1px solid #ece5d8;border-radius:14px;padding:14px 16px;text-align:center}
  .kpi .v{font-size:30px;font-weight:800}
  .kpi .k{font-size:12px;color:#a59a8a}
  /* 直方圖（縱向柱） */
  .cols{display:flex;align-items:flex-end;gap:6px;height:150px;margin-top:6px}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .col .bar{width:100%;max-width:46px;background:#b9863f;border-radius:4px 4px 0 0;min-height:2px}
  .col .n{font-size:12px;color:#413b31;margin-bottom:2px}
  .col .lb{font-size:10.5px;color:#a59a8a;margin-top:4px;white-space:nowrap}
  /* 橫條 */
  .hrow{display:flex;align-items:center;gap:8px;margin:5px 0}
  .hrow .nm{flex:0 0 88px;font-size:13px;text-align:right;color:#413b31;white-space:nowrap;overflow:hidden}
  .hrow .trk{flex:1;display:flex;gap:2px;align-items:center}
  .hrow .seg{height:16px;border-radius:0}
  .hrow .seg:first-child{border-radius:4px 0 0 4px}
  .hrow .seg:last-child{border-radius:0 4px 4px 0}
  .hrow .seg.only{border-radius:4px}
  .hrow .cnt{font-size:12px;color:#a59a8a;margin-left:6px;white-space:nowrap}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 10px;font-size:12px;color:#413b31}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
  details.tbl{margin-top:8px}
  details.tbl summary{font-size:12px;color:#a59a8a;cursor:pointer}
  details.tbl table{border-collapse:collapse;font-size:12px;margin-top:6px;width:100%}
  details.tbl th,details.tbl td{border:1px solid #ece5d8;padding:3px 8px;text-align:right}
  details.tbl th:first-child,details.tbl td:first-child{text-align:left}
  .names{font-size:12.5px;color:#413b31;margin:2px 0 8px}
  .names b{font-weight:700}
  .empty{text-align:center;color:#a59a8a;padding:40px 0}
  .foot{font-size:11.5px;color:#a59a8a;margin-top:6px}
</style>
</head>
<body>
<div class="brand"><img src="assets/logo-full.svg" alt="日商日本國土開發股份有限公司台灣分公司"></div>
<h1>人事資訊看板</h1>
<div class="sub" id="sub">載入中…</div>
<div id="main"></div>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';
function q(k){var m=location.search.match(new RegExp('[?&]'+k+'=([^&]+)'));return m?decodeURIComponent(m[1]):'';}
function jsonp(action,params){return new Promise(function(res){
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  var qs=Object.keys(params||{}).map(function(k){return '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('');
  var s=document.createElement('script');
  s.src=GAS_URL+'?action='+encodeURIComponent(action)+qs+'&callback='+cb;
  var timer=setTimeout(function(){res({ok:false,msg:'連線逾時，請重新整理。'});cleanup();},30000);
  function cleanup(){clearTimeout(timer);delete window[cb];s.remove();}
  window[cb]=function(d){res(d);cleanup();};
  s.onerror=function(){res({ok:false,msg:'連線失敗'});cleanup();};
  document.body.appendChild(s);
});}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 色票（dataviz 驗證過：#3d8f63/#b9863f 全項通過；序列段=同色深淺、非彩虹）
var C_HQ='#3d8f63', C_SITE='#b9863f';
var RAMP4=['#f2e3c5','#d19c4e','#96662a','#4f3413'];                  // 年資段（高對比）
var RAMP5=['#f2e3c5','#d8b075','#b9863f','#82552a','#4f3413'];        // 年齡段（高對比）
var C_RET=['#b0694a','#d19c4e','#f2e3c5'];                             // 已滿65 / 5年內 / 10年內
// 直方圖依值深淺（越多越深＝量感一眼可比）
function shade(v,max){var R=['#ecd9b8','#d8b075','#c08a3f','#96662a','#6b4a1e'];
  return R[Math.min(R.length-1,Math.floor(v/Math.max(max,1)*(R.length-0.01)))];}

function colChart(bins){
  var max=Math.max.apply(null,bins.counts.concat([1]));
  return '<div class="cols">'+bins.labels.map(function(lb,i){
    var h=Math.round(bins.counts[i]/max*118);
    return '<div class="col"><div class="n">'+bins.counts[i]+'</div>'
      +'<div class="bar" style="height:'+h+'px;background:'+shade(bins.counts[i],max)+'" title="'+esc(lb)+'：'+bins.counts[i]+' 人"></div>'
      +'<div class="lb">'+esc(lb)+'</div></div>';
  }).join('')+'</div>';
}
function stackRows(order,units,key,ramp,segLabels,maxCount,noteFn){
  return order.map(function(nm){
    var u=units[nm], segs=u[key], total=u.count;
    var w=Math.max(total/maxCount*100,2);
    var inner=segs.map(function(c,i){
      if(!c)return '';
      return '<div class="seg'+(segs.filter(Boolean).length===1?' only':'')+'" style="flex:'+c+';background:'+ramp[i]+'" title="'+esc(nm)+'・'+esc(segLabels[i])+'：'+c+' 人"></div>';
    }).join('');
    return '<div class="hrow"><div class="nm">'+esc(nm)+'</div>'
      +'<div class="trk" style="max-width:'+w+'%">'+inner+'</div><div class="cnt">'+(noteFn?noteFn(u):total)+'</div></div>';
  }).join('');
}
function legend(labels,colors){
  return '<div class="legend">'+labels.map(function(lb,i){return '<span><i style="background:'+colors[i]+'"></i>'+esc(lb)+'</span>';}).join('')+'</div>';
}
function numTable(order,units,key,segLabels){
  var head='<tr><th>單位</th>'+segLabels.map(function(l){return '<th>'+esc(l)+'</th>';}).join('')+'<th>計</th></tr>';
  var rows=order.map(function(nm){
    var u=units[nm];
    return '<tr><td>'+esc(nm)+'</td>'+u[key].map(function(c){return '<td>'+(c||'')+'</td>';}).join('')+'<td>'+u.count+'</td></tr>';
  }).join('');
  return '<details class="tbl"><summary>數字表</summary><table>'+head+rows+'</table></details>';
}

jsonp('getHrStats',{token:q('t')}).then(function(r){
  var main=document.getElementById('main');
  if(!r||!r.ok){document.getElementById('sub').textContent='';main.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
  var s=r.stats;
  document.getElementById('sub').textContent='資料來源：員工名冊即時快照（在職 '+s.total+' 人）';
  var maxCount=Math.max.apply(null,s.unitOrder.map(function(n){return s.units[n].count;}).concat([1]));
  var byCount=s.unitOrder.slice().sort(function(a,b){return s.units[b].count-s.units[a].count;});

  var html='';
  // KPI
  html+='<div class="kpis"><div class="kpi"><div class="v">'+s.total+'</div><div class="k">在職人數</div></div>'
      +'<div class="kpi"><div class="v">'+s.avgTenure+'</div><div class="k">平均年資（年）</div></div>'
      +'<div class="kpi"><div class="v">'+s.avgAge+'</div><div class="k">平均年齡（歲）</div></div></div>';
  // 1 年資分佈
  html+='<div class="card"><div class="sec-h"><b>① 全公司年資分佈</b><small>看資深/資淺結構與斷層</small></div>'+colChart(s.tenureBins)
      +(s.noJoin?'<div class="foot">※ '+s.noJoin+' 人無入社日未計入</div>':'')+'</div>';
  // 2 年齡分佈
  html+='<div class="card"><div class="sec-h"><b>② 全公司年齡分佈</b><small>看年齡結構與退休高峰</small></div>'+colChart(s.ageBins)
      +(s.noBirth?'<div class="foot">※ '+s.noBirth+' 人無生日未計入</div>':'')+'</div>';
  // 3 各單位人數（降冪·雙色）
  html+='<div class="card"><div class="sec-h"><b>③ 各單位人數</b><small>總公司 vs 工地</small></div>'
      +legend(['總公司','工地'],[C_HQ,C_SITE])
      +byCount.map(function(nm){
        var u=s.units[nm], w=Math.max(u.count/maxCount*100,2), c=u.group==='總公司'?C_HQ:C_SITE;
        return '<div class="hrow"><div class="nm">'+esc(nm)+'</div>'
          +'<div class="trk" style="max-width:'+w+'%"><div class="seg only" style="flex:1;background:'+c+'" title="'+esc(nm)+'：'+u.count+' 人"></div></div>'
          +'<div class="cnt">'+u.count+'</div></div>';
      }).join('')+'</div>';
  // 4 單位×年資（主題排序：平均年資高→低）
  var byTenure=s.unitOrder.slice().sort(function(a,b){return s.units[b].avgTenure-s.units[a].avgTenure;});
  html+='<div class="card"><div class="sec-h"><b>④ 各單位年資結構</b><small>依平均年資排序（資深→資淺）；色越深越資深、條長＝人數</small></div>'
      +legend(s.tenureSegLabels,RAMP4)
      +stackRows(byTenure,s.units,'tenure',RAMP4,s.tenureSegLabels,maxCount,function(u){return '均 '+u.avgTenure+' 年・'+u.count+' 人';})
      +numTable(byTenure,s.units,'tenure',s.tenureSegLabels)+'</div>';
  // 5 單位×年齡（主題排序：平均年齡高→低）
  var byAge=s.unitOrder.slice().sort(function(a,b){return s.units[b].avgAge-s.units[a].avgAge;});
  html+='<div class="card"><div class="sec-h"><b>⑤ 各單位年齡結構</b><small>依平均年齡排序（年長→年輕）；色越深越年長、條長＝人數</small></div>'
      +legend(s.ageSegLabels,RAMP5)
      +stackRows(byAge,s.units,'age',RAMP5,s.ageSegLabels,maxCount,function(u){return '均 '+u.avgAge+' 歲・'+u.count+' 人';})
      +numTable(byAge,s.units,'age',s.ageSegLabels)+'</div>';
  // 7 入社年度趨勢（時間軸·不排序）
  var jys=Object.keys(s.joinYears).map(Number).sort(function(a,b){return a-b;});
  if(jys.length){
    var y0=jys[0],y1=jys[jys.length-1],trend={labels:[],counts:[]};
    for(var y=y0;y<=y1;y++){trend.labels.push(String(y).slice(2));trend.counts.push(s.joinYears[y]||0);}
    html+='<div class="card"><div class="sec-h"><b>⑦ 入社年度趨勢</b><small>每年新進人數（現仍在職者）；手機可左右滑動</small></div>'
        +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:'+Math.max(trend.labels.length*30,320)+'px">'+colChart(trend)+'</div></div></div>';
  }
  // 8 年齡×年資散點（右上=高齡資深·經驗集中風險）
  if(s.agePairs&&s.agePairs.length){
    var W=640,H=280,PX=36,PY=18;
    var maxT=Math.max.apply(null,s.agePairs.map(function(p){return p[1];}).concat([20]))+2;
    var xs=function(a){return PX+(a-20)/(70-20)*(W-PX-10);};
    var ys=function(t){return H-PY-(t/maxT)*(H-PY-10);};
    var dots=s.agePairs.map(function(p){
      var col=p[2]==='總公司'?C_HQ:C_SITE;
      return '<circle cx="'+xs(p[0]).toFixed(1)+'" cy="'+ys(p[1]).toFixed(1)+'" r="4.5" fill="'+col+'" stroke="#fff" stroke-width="1.5"><title>'+p[0]+' 歲・年資 '+p[1]+' 年（'+p[2]+'）</title></circle>';
    }).join('');
    var grid='';
    [30,40,50,60].forEach(function(a){grid+='<line x1="'+xs(a)+'" y1="'+(H-PY)+'" x2="'+xs(a)+'" y2="8" stroke="#ece5d8"/><text x="'+xs(a)+'" y="'+(H-4)+'" font-size="10" fill="#a59a8a" text-anchor="middle">'+a+'歲</text>';});
    [5,10,15,20].forEach(function(t){if(t<maxT)grid+='<line x1="'+PX+'" y1="'+ys(t)+'" x2="'+(W-10)+'" y2="'+ys(t)+'" stroke="#ece5d8"/><text x="'+(PX-4)+'" y="'+(ys(t)+3)+'" font-size="10" fill="#a59a8a" text-anchor="end">'+t+'年</text>';});
    var zone='<rect x="'+xs(55)+'" y="8" width="'+(W-10-xs(55))+'" height="'+(ys(10)-8)+'" fill="#b0694a" opacity="0.06"/>';
    html+='<div class="card"><div class="sec-h"><b>⑧ 年齡 × 年資</b><small>一點一人（匿名）；右上淡紅區＝55歲+且年資10年+＝經驗集中風險帶</small></div>'
        +legend(['總公司','工地'],[C_HQ,C_SITE])
        +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+zone+grid+dots+'</svg></div>';
  }
  // 9 職能結構（降冪）
  if(s.roleCounts){
    var roles=Object.keys(s.roleCounts).sort(function(a,b){return s.roleCounts[b]-s.roleCounts[a];});
    var maxR=Math.max.apply(null,roles.map(function(k){return s.roleCounts[k];}).concat([1]));
    html+='<div class="card"><div class="sec-h"><b>⑨ 職能結構</b><small>依選項主檔職稱分類；降冪</small></div>'
        +roles.map(function(k){
          var v=s.roleCounts[k],w=Math.max(v/maxR*100,2);
          return '<div class="hrow"><div class="nm">'+esc(k)+'</div>'
            +'<div class="trk" style="max-width:'+w+'%"><div class="seg only" style="flex:1;background:'+shade(v,maxR)+'" title="'+esc(k)+'：'+v+' 人"></div></div>'
            +'<div class="cnt">'+v+'</div></div>';
        }).join('')+'</div>';
  }
  // 6 退休預警
  var retTotal=function(nm){var R=s.units[nm].retire;return R.now.length+R.y5.length+R.y10.length;};
  var retWeight=function(nm){var R=s.units[nm].retire;return R.now.length*100+R.y5.length*10+R.y10.length;};  // 急迫度：已滿65≫5年內≫10年內
  var retUnits=s.unitOrder.filter(function(nm){return retTotal(nm)>0;}).sort(function(a,b){return retWeight(b)-retWeight(a);});
  html+='<div class="card"><div class="sec-h"><b>⑥ 退休預警</b><small>已滿 65／5 年內滿 65（60-64 歲）／10 年內（55-59 歲）</small></div>'
      +legend(['已滿 65','5 年內','10 年內'],C_RET);
  if(!retUnits.length) html+='<div class="empty" style="padding:16px 0">目前沒有 55 歲以上的在職同仁</div>';
  retUnits.forEach(function(nm){
    var R=s.units[nm].retire, total=R.now.length+R.y5.length+R.y10.length;
    var segs=[R.now.length,R.y5.length,R.y10.length];
    var w=Math.max(total/maxCount*100,2);
    var inner=segs.map(function(c,i){ if(!c)return '';
      return '<div class="seg" style="flex:'+c+';background:'+C_RET[i]+'"></div>';}).join('');
    html+='<div class="hrow"><div class="nm">'+esc(nm)+'</div><div class="trk" style="max-width:'+w+'%">'+inner+'</div><div class="cnt">'+total+'</div></div>'
        +'<div class="names" style="margin-left:96px">'
        +(R.now.length?'<b>已滿65：</b>'+R.now.map(esc).join('、')+'　':'')
        +(R.y5.length?'<b>5年內：</b>'+R.y5.map(esc).join('、')+'　':'')
        +(R.y10.length?'<b>10年內：</b>'+R.y10.map(esc).join('、'):'')+'</div>';
  });
  html+='</div>';
  main.innerHTML=html;
});
</script>
</body>
</html>
