<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="assets/app.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>活動紀錄看板</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans TC", sans-serif;
    padding: 20px 16px 40px; font-size: 17px; line-height: 1.6; color: #333;
    background: #f7f7f7; max-width: 480px; margin: 0 auto;
  }
  .brand { text-align: center; margin: 0 0 14px; }
  .brand img { width: 100%; max-width: 240px; height: auto; }
  h1 { font-size: 20px; margin: 0 0 4px; color: #1a1a1a; }
  .meta { font-size: 14px; color: #888; margin-bottom: 18px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
  .num { font-size: 26px; font-weight: 700; color: #1a1a1a; }
  .num.green { color: #06a04a; } .num.red { color: #c62828; } .num.grey { color: #888; }
  .cap { font-size: 13px; color: #888; }
  .sub { font-size: 14px; color: #666; margin-top: 12px; text-align: center; }
  .sec { font-size: 16px; color: #666; margin: 24px 0 10px; font-weight: 600; }
  .grp { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 8px; overflow: hidden; }
  .grp summary { padding: 12px 14px; cursor: pointer; font-weight: 600; list-style: none; display: flex; align-items: baseline; gap: 8px; }
  .grp summary::-webkit-details-marker { display: none; }
  .grp summary::before { content: '▸'; color: #bbb; font-size: 13px; transition: transform .15s; }
  .grp[open] summary::before { transform: rotate(90deg); }
  .grp .cnt { color: #888; font-weight: 400; font-size: 14px; }
  .grp .body { padding: 0 14px 12px 30px; }
  .names { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 15px; color: #444; }
  .p { padding: 4px 0; border-bottom: 1px solid #f2f2f2; }
  .p:last-child { border-bottom: none; }
  .p .n { font-weight: 600; }
  .p .att { font-size: 12px; padding: 1px 7px; border-radius: 10px; margin-left: 8px; }
  .att-y { background: #e6f9ee; color: #1a7d44; }
  .att-n { background: #fdecea; color: #b71c1c; }
  .p .op { font-size: 14px; color: #444; display: block; margin-top: 2px; }
  .empty { text-align: center; color: #888; padding: 30px 0; font-size: 15px; }
  /* tabs */
  .tabs { display: flex; gap: 8px; margin: 0 0 16px; }
  .tabs button { flex: 1; padding: 10px 0; font-size: 15px; font-weight: 600; color: #666;
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; cursor: pointer; }
  .tabs button.on { background: #1a5c3a; border-color: #1a5c3a; color: #fff; }
  /* 活動管理 */
  .fld { margin-bottom: 12px; }
  .fld label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  .fld input, .fld textarea { width: 100%; font-size: 16px; padding: 9px 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
  .fld textarea { min-height: 56px; resize: vertical; }
  .btn { display: inline-block; padding: 9px 18px; font-size: 15px; font-weight: 600; border: none; border-radius: 9px; cursor: pointer; }
  .btn-pri { background: #1a5c3a; color: #fff; width: 100%; }
  .btn-sm { padding: 5px 12px; font-size: 13px; background: #f1f1f1; color: #333; margin: 4px 6px 0 0; }
  .btn-sm.warn { background: #fdecea; color: #b71c1c; }
  .act-h { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .act-h .nm { font-weight: 700; font-size: 16px; }
  .st { font-size: 12px; padding: 1px 8px; border-radius: 10px; }
  .st-open { background: #e6f9ee; color: #1a7d44; } .st-closed { background: #eee; color: #777; } .st-due { background: #fff3e0; color: #b26a00; }
  .act-meta { font-size: 13px; color: #888; margin-top: 2px; }
  .msg { font-size: 14px; margin-top: 8px; min-height: 1em; }
  .msg.ok { color: #1a7d44; } .msg.err { color: #b71c1c; }
  .rep { border-top: 1px solid #f0f0f0; margin-top: 10px; padding-top: 8px; }
  @media (min-width: 768px) {
    body { max-width: 720px; padding: 32px 24px 60px; font-size: 18px; }
    h1 { font-size: 25px; } .num { font-size: 32px; } .cap { font-size: 14px; }
    .card { padding: 26px 30px; } .sec { font-size: 18px; }
  }
</style></head><body>
<div class="brand"><img src="assets/logo-full.svg" alt="日商日本國土開發股份有限公司台灣分公司"></div>
<div class="tabs">
  <button id="tabbtn-stats" class="on" onclick="showTab('stats')">出席統計</button>
  <button id="tabbtn-manage" onclick="showTab('manage')">活動管理</button>
  <button id="tabbtn-tables" onclick="showTab('tables')">桌次管理</button>
  <button id="tabbtn-anniv" onclick="showTab('anniv')">年資里程碑</button>
</div>
<div id="tab-stats">
  <h1 id="title">活動紀錄看板</h1>
  <select id="act-picker" style="width:100%;font-size:15px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;display:none" onchange="loadStats(this.value)"></select>
  <div id="meta" class="meta">載入中…</div>
  <div id="content"><div class="empty">載入中…</div></div>
</div>
<div id="tab-anniv" style="display:none">
  <h1>年資里程碑</h1>
  <div id="anniv-box"><div class="empty">載入中…</div></div>
</div>
<div id="tab-manage" style="display:none">
  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">➕ 新增活動</div>
    <div class="fld"><label>活動名稱（必填）</label><input id="na-name" placeholder="例：2026 尾牙"></div>
    <div class="fld"><label>調查截止日（必填，系統自動收到當天 23:59）</label><input id="na-deadline" type="date"></div>
    <div class="fld"><label>活動日期（選填，顯示在問卷上）</label><input id="na-event" type="date"></div>
    <div class="fld"><label>說明文字（選填，顯示在問卷卡片上）</label><textarea id="na-q" placeholder="例：請於截止日前回覆出席意願"></textarea></div>
    <button class="btn btn-pri" onclick="createAct()">建立活動（狀態自動＝開放）</button>
    <div id="na-msg" class="msg"></div>
  </div>
  <div class="sec">活動列表</div>
  <div id="act-list"><div class="empty">載入中…</div></div>
</div>
<div id="tab-tables" style="display:none">
  <h1>桌次管理</h1>
  <div class="fld"><label>活動</label>
    <select id="ti-act" style="width:100%;font-size:15px;padding:8px 10px;border:1px solid #ddd;border-radius:8px" onchange="loadGuests()"></select></div>
  <div class="card" style="margin-top:12px">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">📤 下載座位排列用檔</div>
    <button class="btn btn-pri" onclick="dlSeatingFile()">下載排位用檔（出席同仁依單位＋來賓依負責人）</button>
    <div style="font-size:12.5px;color:#888;margin-top:8px">上方＝空白座位格；下方＝分類名單，剪下貼到上方排位。排好把檔案傳回給維護者匯入。</div>
    <div id="sf-msg" class="msg"></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">🪑 員工桌次（貼上匯入）</div>
    <div class="fld"><label>從 Excel 複製「姓名、桌次」兩欄，直接貼在這裡（一行一人）</label>
      <textarea id="ti-paste" rows="6" placeholder="王小明&#9;1&#10;李美麗&#9;主桌"></textarea></div>
    <button class="btn" onclick="tiMatch()">比對名單</button>
    <div id="ti-result" style="margin-top:10px"></div>
    <div id="ti-msg" class="msg"></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">🎩 來賓名單</div>
    <div id="guest-list"><div class="empty">載入中…</div></div>
    <div style="font-size:12.5px;color:#888;margin-top:8px">來賓名單由維護者代灌（Excel 傳給維護者）；增減或改桌次＝傳更新後的檔案整批置換。</div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">🔳 員工 QR 批次下載</div>
    <button class="btn btn-pri" onclick="dlAllQr()">下載全體在職員工 QR（ZIP・每張標姓名）</button>
    <div style="font-size:12.5px;color:#888;margin-top:8px">QR＝本活動個人報到碼（含員編簽章、跨活動無效）；不需 LINE 綁定即可產生。</div>
    <div id="qr-msg" class="msg"></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">📥 員工名冊下載</div>
    <button class="btn btn-pri" onclick="downloadRoster()">下載員工名冊（單位總表）</button>
    <button class="btn btn-pri" style="margin-top:8px" onclick="downloadRosterFlat()">下載員工名冊（逐人明細）</button>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:400;color:#555;font-size:14px">
      <input type="checkbox" id="s-dl-leavers" style="width:auto;margin:0">列出離職同仁（僅逐人明細適用）
    </label>
    <div id="s-dl-msg" class="msg"></div>
  </div>
</div>
<script src="assets/roster-wide.js"></script>
<script src="assets/roster-dl.js"></script>
<script src="assets/anniv.js"></script>
<script src="assets/table-import.js"></script>
<script src="assets/seating.js"></script>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';
function q(k){var m=location.search.match(new RegExp('[?&]'+k+'=([^&]+)'));return m?decodeURIComponent(m[1]):'';}
// 管理者專屬跨看板切換（只有洪炫佑的 token 顯示；受眾分離維持：佳岑/雅慧看不到）
function showAdminSwitch(who){
  if(who!=='洪炫佑'||document.getElementById('adm-switch'))return;
  var a=document.createElement('a');
  a.id='adm-switch';a.textContent='⇄ 人事異動看板';
  a.href='board.html?t='+encodeURIComponent(q('t'));
  a.style.cssText='position:fixed;top:10px;right:10px;z-index:99;background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#333;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,.12)';
  a.addEventListener('click',function(e){e.preventDefault();location.href=a.href;}); // iOS standalone：<a> 會彈內嵌 Safari，JS 導頁留在 App 內
  document.body.appendChild(a);
}
function jsonp(action,params){return new Promise(function(res){
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  var qs=Object.keys(params||{}).filter(function(k){return params[k]!=='';}).map(function(k){return '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('');
  var s=document.createElement('script');
  s.src=GAS_URL+'?action='+encodeURIComponent(action)+qs+'&callback='+cb;
  var timer=setTimeout(function(){res({ok:false,msg:'連線逾時（伺服器喚醒中），請重新整理再試。'});cleanup();},15000);
  s.onerror=function(){res({ok:false,msg:'連線失敗，請重新整理。'});cleanup();};
  function cleanup(){clearTimeout(timer);window[cb]=function(){};s.remove();}
  window[cb]=function(d){res(d);cleanup();};
  document.body.appendChild(s);});}
function esc(s){return (s==null?'':s).toString().replace(/</g,'&lt;');}

// 依單位收納（保留原順序）；bodyFn(items) 決定每組內容。單位旁顯示人數。
function groupHtml(arr, bodyFn){
  if(!arr.length) return '<div class="empty">（無）</div>';
  var m={},order=[];
  arr.forEach(function(o){if(!m[o.unit]){m[o.unit]=[];order.push(o.unit);}m[o.unit].push(o);});
  return order.map(function(u){
    return '<details class="grp"><summary>'+esc(u)+'<span class="cnt">'+m[u].length+' 人</span></summary><div class="body">'+bodyFn(m[u])+'</div></details>';
  }).join('');
}
// 純名字（橫排流式）
function listHtml(arr){
  return groupHtml(arr, function(items){
    return '<div class="names">'+items.map(function(o){return '<span>'+esc(o.name)+'</span>';}).join('')+'</div>';
  });
}
// 意見清單：每人一列，姓名＋參加/不參加標記＋意見
function opinionsHtml(arr){
  return groupHtml(arr, function(items){
    return items.map(function(o){
      var att=o.attend==='參加' ? '<span class="att att-y">參加</span>' : '<span class="att att-n">不參加</span>';
      return '<div class="p"><span class="n">'+esc(o.name)+'</span>'+att+'<span class="op">'+esc(o.opinion)+'</span></div>';
    }).join('');
  });
}

// ── 分頁切換（活動管理 lazy load）──────────────────────────────────────────
var manageLoaded=false;
function showTab(t){
  ['stats','manage','tables','anniv'].forEach(function(k){
    document.getElementById('tab-'+k).style.display = t===k?'':'none';
    document.getElementById('tabbtn-'+k).className = t===k?'on':'';
  });
  if(t==='manage'&&!manageLoaded){manageLoaded=true;loadActs();}
  if(t==='tables'&&!tablesLoaded){tablesLoaded=true;loadTablesTab();}
}
var tablesLoaded=false;
function setMsg(id,text,cls){var el=document.getElementById(id);el.textContent=text;el.className='msg '+(cls||'');}

// ── 活動管理 ──────────────────────────────────────────────────────────────
function loadActs(){
  var box=document.getElementById('act-list');
  box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('listActivities',{token:q('t')}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">還沒有活動</div>';return;}
    box.innerHTML=r.rows.slice().reverse().map(actCard).join('');
  });
}

// ── 桌次匯入與發布 ────────────────────────────────────────────────────────
var tiState=null; // {actId, people, autoWrites, unmatched, ambiguous}
function tiMatch(){
  var actId=document.getElementById('ti-act').value;
  var text=document.getElementById('ti-paste').value;
  if(!actId){setMsg('ti-msg','請先選活動','err');return;}
  var parsed=parseTablePaste(text);
  if(!parsed.length){setMsg('ti-msg','貼上內容是空的','err');return;}
  setMsg('ti-msg','比對中…','');
  jsonp('listTableBoard',{token:q('t'),actId:actId}).then(function(r){
    if(!r||!r.ok){setMsg('ti-msg',(r&&r.msg)||'載入失敗','err');return;}
    var m=matchByName(parsed,r.people);
    tiState={actId:actId,people:r.people,autoWrites:m.writes,unmatched:m.unmatched,ambiguous:m.ambiguous,published:r.published};
    var opts='<option value="">— 忽略這筆 —</option>'+r.people.map(function(p){
      return '<option value="'+esc(p.userId)+'">'+esc(p.name)+'（'+esc(p.unit)+'）</option>';}).join('');
    var h='<div>對上 <b>'+m.writes.length+'</b> 筆'
      +(m.unmatched.length?'・<span style="color:#b0694a">查無 '+m.unmatched.length+' 筆</span>':'')
      +(m.ambiguous.length?'・<span style="color:#b0694a">同名 '+m.ambiguous.length+' 筆</span>':'')+'</div>';
    m.unmatched.forEach(function(u,i){
      h+='<div class="fld" style="margin-top:6px"><label>「'+esc(u.name)+'」（桌次 '+esc(u.table)+'）查無此參加者，指定：</label>'
        +'<select class="ti-fix" data-table="'+esc(u.table)+'">'+opts+'</select></div>';});
    m.ambiguous.forEach(function(a){
      var co='<option value="">— 忽略這筆 —</option>'+a.candidates.map(function(p){
        return '<option value="'+esc(p.userId)+'">'+esc(p.name)+'（'+esc(p.unit)+'）</option>';}).join('');
      h+='<div class="fld" style="margin-top:6px"><label>「'+esc(a.name)+'」（桌次 '+esc(a.table)+'）有同名多人，選一位：</label>'
        +'<select class="ti-fix" data-table="'+esc(a.table)+'">'+co+'</select></div>';});
    h+='<button class="btn btn-pri" style="margin-top:10px" onclick="tiWrite()">寫入桌次</button>'
      +'<button class="btn" style="margin-top:8px" onclick="tiPublish()">'+(tiState.published?'已發布（再按重新確認）':'發布給同仁看')+'</button>';
    document.getElementById('ti-result').innerHTML=h;
    setMsg('ti-msg','','');
  });
}
function tiWrite(){
  if(!tiState){setMsg('ti-msg','請先比對','err');return;}
  var writes=tiState.autoWrites.slice();
  document.querySelectorAll('.ti-fix').forEach(function(sel){
    if(sel.value)writes.push({userId:sel.value,table:sel.getAttribute('data-table')||''});
  });
  var cur={};tiState.people.forEach(function(p){cur[p.userId]=p.table;});
  var todo=diffWrites(writes,cur);
  if(!todo.length){setMsg('ti-msg','沒有需要變更的桌次（都和現值相同）','ok');return;}
  var chunks=[];while(todo.length)chunks.push(todo.splice(0,20));
  var applied=0;
  setMsg('ti-msg','寫入中…','');
  (function next(){
    var c=chunks.shift();
    if(!c){setMsg('ti-msg','完成：已寫入 '+applied+' 筆桌次。再按一次「比對名單」可核對結果。','ok');return;}
    jsonp('setTables',{token:q('t'),actId:tiState.actId,writes:JSON.stringify(c)}).then(function(r){
      if(!r||!r.ok){setMsg('ti-msg',(r&&r.msg)||'寫入失敗','err');return;}
      applied+=r.applied;next();
    });
  })();
}
function tiPublish(){
  if(!tiState){setMsg('ti-msg','請先比對','err');return;}
  if(!confirm('發布後，同仁在 LINE 活動頁就看得到自己的桌次。確定發布？'))return;
  jsonp('publishTables',{token:q('t'),actId:tiState.actId}).then(function(r){
    if(!r||!r.ok){setMsg('ti-msg',(r&&r.msg)||'發布失敗','err');return;}
    tiState.published=true;
    setMsg('ti-msg','已發布。之後再改桌次會即時生效。','ok');
  });
}

// ── 桌次管理分頁 ──────────────────────────────────────────────────────────
function loadTablesTab(){
  jsonp('listActivities',{token:q('t')}).then(function(r){
    if(!r||!r.ok){document.getElementById('guest-list').innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    var sel=document.getElementById('ti-act');
    sel.innerHTML=r.rows.slice().reverse().map(function(a){
      return '<option value="'+esc(a.id)+'">'+esc(a.name)+'（回覆 '+a.replies+'）</option>';
    }).join('');
    loadGuests();
  });
}
function loadGuests(){
  var actId=document.getElementById('ti-act').value;
  var box=document.getElementById('guest-list');
  if(!actId){box.innerHTML='<div class="empty">請先選活動</div>';return;}
  box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('listGuests',{token:q('t'),actId:actId}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">尚未匯入來賓名單</div>';return;}
    var total=0;
    var h='<table style="width:100%;border-collapse:collapse;font-size:13px">'
      +'<tr style="color:#888;text-align:left"><th style="padding:4px 6px">負責人員</th><th>廠商</th><th>人數</th><th>桌次</th></tr>';
    r.rows.forEach(function(g){
      total+=g.count;
      h+='<tr style="border-top:1px solid #eee"><td style="padding:4px 6px">'+esc(g.owner)+'</td><td>'+esc(g.name)
        +'</td><td>'+g.count+'</td><td>'+esc(g.table||'—')+'</td></tr>';
    });
    h+='</table><div style="font-size:12.5px;color:#888;margin-top:6px">來賓合計 '+total+' 人（不含人數 0 的廠商席位）</div>';
    box.innerHTML=h;
  });
}

// 座位排列用檔（上方空白座位格＋下方 出席同仁依單位／來賓依負責人）
function dlSeatingFile(){
  var actId=document.getElementById('ti-act').value;
  if(!actId){setMsg('sf-msg','請先選活動','err');return;}
  setMsg('sf-msg','產生中…','');
  Promise.all([__rdlXlsx(),
    jsonp('listTableBoard',{token:q('t'),actId:actId}),
    jsonp('listGuests',{token:q('t'),actId:actId}),
    jsonp('listOptions',{token:q('t')})
  ]).then(function(rs){
    var tb=rs[1],gu=rs[2],op=rs[3];
    if(!tb||!tb.ok){setMsg('sf-msg',(tb&&tb.msg)||'出席名單載入失敗','err');return;}
    if(!gu||!gu.ok){setMsg('sf-msg',(gu&&gu.msg)||'來賓載入失敗','err');return;}
    var byUnit={};
    tb.people.forEach(function(p){(byUnit[p.unit]=byUnit[p.unit]||[]).push(p.name);});
    var unitOrder=[];
    if(op&&op.ok)op.rows.forEach(function(o){
      if(o.type==='單位'&&byUnit[o.name]&&unitOrder.indexOf(o.name)<0)unitOrder.push(o.name);
    });
    Object.keys(byUnit).forEach(function(u){if(unitOrder.indexOf(u)<0)unitOrder.push(u);});
    var guestsByOwner=expandGuests(gu.rows);
    var owners=[];
    gu.rows.forEach(function(g){var o=(g.owner||'').trim()||'其他';if(g.count>0&&owners.indexOf(o)<0&&o!=='其他')owners.push(o);});
    var aoa=buildSeatingAoa(unitOrder,byUnit,owners,guestsByOwner);
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    styleWs_(ws,aoa,{headerRow:true});
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'座位表');
    XLSX.writeFile(wb,'座位排列用檔_'+tb.actName+'_'+__rdlToday().replace(/\//g,'-')+'.xlsx');
    setMsg('sf-msg','已下載 ✅（出席同仁 '+tb.people.length+' 人＋來賓席位 '+Object.keys(guestsByOwner).reduce(function(n,k){return n+guestsByOwner[k].length;},0)+' 格）','ok');
  }).catch(function(e){setMsg('sf-msg',String(e&&e.message||e),'err');});
}

// QR 批次下載（qrcode-gen＋jszip 用到才載）
function __tmLib(src,flag){
  if(window[flag])return Promise.resolve();
  return new Promise(function(res,rej){
    var s=document.createElement('script');s.src=src;s.onload=res;
    s.onerror=function(){rej(new Error('元件載入失敗，請重試'));};
    document.body.appendChild(s);
  });
}
function __qrCanvas(code,label1,label2){
  var qr=qrcode(0,'M');qr.addData(code);qr.make();
  var n=qr.getModuleCount(),cell=8,quiet=24,size=n*cell+quiet*2;
  var cv=document.createElement('canvas');cv.width=size;cv.height=size+56;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#000';
  for(var r=0;r<n;r++)for(var c=0;c<n;c++)if(qr.isDark(r,c))ctx.fillRect(quiet+c*cell,quiet+r*cell,cell,cell);
  ctx.textAlign='center';
  ctx.font='bold 22px -apple-system,sans-serif';
  ctx.fillText(label1,size/2,size+22);
  ctx.font='14px -apple-system,sans-serif';ctx.fillStyle='#555';
  ctx.fillText(label2,size/2,size+44);
  return cv;
}
function dlAllQr(){
  var actId=document.getElementById('ti-act').value;
  if(!actId){setMsg('qr-msg','請先選活動','err');return;}
  setMsg('qr-msg','產生中…（約 150 張）','');
  Promise.all([
    __tmLib('assets/qrcode-gen.js','qrcode'),
    __tmLib('assets/jszip.min.js','JSZip'),
    jsonp('getCheckinCodes',{token:q('t'),actId:actId})
  ]).then(function(rs){
    var r=rs[2];
    if(!r||!r.ok){setMsg('qr-msg',(r&&r.msg)||'簽發失敗','err');return;}
    var zip=new JSZip();
    var chain=Promise.resolve();
    r.rows.forEach(function(p){
      chain=chain.then(function(){
        return new Promise(function(res){
          __qrCanvas(p.code,p.name,p.unit+'・'+p.empNo).toBlob(function(b){
            zip.file(p.empNo+'_'+p.name+'.png',b);res();
          });
        });
      });
    });
    chain.then(function(){return zip.generateAsync({type:'blob'});}).then(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='員工QR_'+actId+'_'+__rdlToday().replace(/\//g,'-')+'.zip';
      a.click();URL.revokeObjectURL(a.href);
      setMsg('qr-msg','已下載 ✅（'+r.rows.length+' 張，每張下方標姓名／單位／員編）','ok');
    });
  }).catch(function(e){setMsg('qr-msg',String(e&&e.message||e),'err');});
}
var LIFF_URL='https://liff.line.me/2010451233-a781rqsm';
function copyLink(id,btn){
  var url=LIFF_URL+'?act='+encodeURIComponent(id);
  function done(ok){btn.textContent=ok?'✅ 已複製':'複製失敗';setTimeout(function(){btn.textContent='📋 複製問卷網址';},2000);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(function(){done(true);},function(){fallback();});}
  else fallback();
  function fallback(){
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();
    try{done(document.execCommand('copy'));}catch(e){done(false);}ta.remove();
  }
}
function actCard(a){
  var st = a.status==='開放' ? (a.open?'<span class="st st-open">開放中</span>':'<span class="st st-due">已截止</span>')
                             : '<span class="st st-closed">已關閉</span>';
  var btns = '<button class="btn btn-sm" onclick="copyLink(\''+esc(a.id)+'\',this)">📋 複製問卷網址</button>'
    +(a.status==='開放'
      ? '<button class="btn btn-sm warn" onclick="setSt(\''+esc(a.id)+'\',\'關閉\')">關閉填寫</button>'
      : '<button class="btn btn-sm" onclick="setSt(\''+esc(a.id)+'\',\'開放\')">重新開放</button>')
    +'<button class="btn btn-sm" onclick="chgDl(\''+esc(a.id)+'\')">改截止日</button>'
    +'<button class="btn btn-sm" onclick="toggleRep(this,\''+esc(a.id)+'\')">回覆明細（'+a.replies+'）</button>'
    +(a.replies===0?'<button class="btn btn-sm warn" onclick="delAct(\''+esc(a.id)+'\',\''+esc(a.name)+'\')">🗑 刪除</button>':'');
  return '<div class="card" id="act-'+esc(a.id)+'">'
    +'<div class="act-h"><span class="nm">'+esc(a.name)+'</span>'+st+'</div>'
    +'<div class="act-meta">截止 '+esc(a.deadline)+(a.eventDate?'　活動日 '+esc(a.eventDate):'')+'　回覆 '+a.replies+' 筆　<span style="color:#bbb">'+esc(a.id)+'</span></div>'
    +(a.question?'<div class="act-meta">說明：'+esc(a.question)+'</div>':'')
    +(a.replies>0?'<div class="act-meta" style="color:#b26a00">※ 已有 '+a.replies+' 筆回覆，不可刪除（避免回覆資料遺失）；不再使用請按「關閉填寫」</div>':'')
    +'<div>'+btns+'</div><div class="msg" data-msg></div><div class="rep" style="display:none" data-rep></div></div>';
}
function cardMsg(id,text,cls){var c=document.getElementById('act-'+id);if(!c)return;var el=c.querySelector('[data-msg]');el.textContent=text;el.className='msg '+(cls||'');}
function createAct(){
  var name=document.getElementById('na-name').value.trim();
  var dl=document.getElementById('na-deadline').value;
  if(!name){setMsg('na-msg','請填活動名稱','err');return;}
  if(!dl){setMsg('na-msg','請選調查截止日','err');return;}
  setMsg('na-msg','建立中…','');
  jsonp('addActivity',{token:q('t'),name:name,deadlineDate:dl,eventDate:document.getElementById('na-event').value,question:document.getElementById('na-q').value.trim()}).then(function(r){
    if(!r||!r.ok){setMsg('na-msg',(r&&r.msg)||'建立失敗','err');return;}
    setMsg('na-msg','✅ 已建立（'+r.id+'），截止 '+r.deadline,'ok');
    document.getElementById('na-name').value='';document.getElementById('na-q').value='';
    loadActs();
  });
}
function setSt(id,st){
  if(st==='關閉'&&!confirm('確定關閉「'+id+'」的填寫？（之後可重新開放）'))return;
  cardMsg(id,'處理中…','');
  jsonp('setActivityStatus',{token:q('t'),actId:id,status:st}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'失敗','err');return;}
    loadActs();
  });
}
function delAct(id,name){
  if(!confirm('確定刪除「'+name+'」？此活動還沒有任何回覆，刪除後問卷連結即失效。'))return;
  cardMsg(id,'刪除中…','');
  jsonp('deleteActivity',{token:q('t'),actId:id}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'刪除失敗','err');return;}
    loadActs();
  });
}
function chgDl(id){
  var v=prompt('新的調查截止日（YYYY-MM-DD，系統自動收到當天 23:59）：');
  if(!v)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v.trim())){alert('格式要 YYYY-MM-DD，例如 2026-08-15');return;}
  cardMsg(id,'處理中…','');
  jsonp('updateActivity',{token:q('t'),actId:id,deadlineDate:v.trim()}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'失敗','err');return;}
    loadActs();
  });
}
function toggleRep(btn,id){
  var c=document.getElementById('act-'+id);var box=c.querySelector('[data-rep]');
  if(box.style.display!=='none'){box.style.display='none';return;}
  box.style.display='';box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('getActivityReplies',{token:q('t'),actId:id}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">還沒有回覆</div>';return;}
    // 依單位收納（同出席統計），單位旁顯示人數
    box.innerHTML=groupHtml(r.rows,function(items){
      return items.map(function(x){
        var att=x.attend==='參加'?'<span class="att att-y">參加</span>':'<span class="att att-n">'+esc(x.attend||'—')+'</span>';
        return '<div class="p"><span class="n">'+esc(x.name)+'</span>'+att
          +(x.diet?'<span style="font-size:13px;color:#666">　'+esc(x.diet)+'</span>':'')
          +'<span style="font-size:12px;color:#bbb">　'+esc(x.time)+'</span>'
          +(x.opinion?'<span class="op">'+esc(x.opinion)+'</span>':'')+'</div>';
      }).join('');
    });
  });
}

// 活動切換下拉（歷史場次也能回看統計）
jsonp('listActivities',{token:q('t')}).then(function(r){
  if(!r||!r.ok||!r.rows.length)return;
  var sel=document.getElementById('act-picker');
  sel.innerHTML=r.rows.slice().reverse().map(function(a){
    var st=a.status==='開放'?(a.open?'開放中':'已截止'):'已關閉';
    return '<option value="'+esc(a.id)+'">'+esc(a.name)+'（'+st+'・回覆 '+a.replies+'）</option>';
  }).join('');
  if(window._curAct)sel.value=window._curAct;
  sel.style.display='';
});

function loadStats(act){
  var meta=document.getElementById('meta'), box=document.getElementById('content');
  meta.textContent='載入中…';box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('getActivityStats',{token:q('t'),act:act||''}).then(function(r){
  if(!r||!r.ok){meta.textContent='';box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'連結無效或已失效。')+'</div>';return;}
  var a=r.activity, c=r.counts;
  window._curAct=a.id||'';
  var sel=document.getElementById('act-picker');
  if(sel.options.length&&a.id)sel.value=a.id;
  document.getElementById('title').textContent=a.name||'活動紀錄看板';
  meta.textContent=[a.eventDate?'活動日期：'+a.eventDate:'', a.deadlineText?'回覆截止：'+a.deadlineText:'', '狀態：'+a.status, '（'+r.who+'）'].filter(Boolean).join('　');
  showAdminSwitch(r.who);
  var noReply=c.boundNoReply+c.notBound;
  box.innerHTML=
    '<div class="card"><div class="grid">'
      +'<div><div class="num green">'+c.attend+'</div><div class="cap">參加</div></div>'
      +'<div><div class="num red">'+c.absent+'</div><div class="cap">不參加</div></div>'
      +'<div><div class="num grey">'+noReply+'</div><div class="cap">未填</div></div>'
    +'</div><div class="sub">全員 '+c.total+'・已回覆 '+c.replied+'・葷 '+c.meat+'／素 '+c.veg+'</div></div>'
    +'<div class="sec">意見（'+(r.opinions||[]).length+'）— 參加與不參加者填的意見</div>'+opinionsHtml(r.opinions||[])
    +'<div class="sec">不參加（'+c.absent+'）</div>'+listHtml(r.absentList)
    +'<div class="sec">已綁定未填（'+c.boundNoReply+'）— 催填問卷連結即可</div>'+listHtml(r.boundNoReply)
    +'<div class="sec">未綁定（'+c.notBound+'）— 要先完成身分綁定才能填</div>'+listHtml(r.notBound);
  });
}
