<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="assets/app.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>活動紀錄看板</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans TC", sans-serif;
    padding: 20px 16px 40px; font-size: 17px; line-height: 1.6; color: #333;
    background: #f7f7f7; max-width: 480px; margin: 0 auto;
  }
  .brand { text-align: center; margin: 0 0 14px; }
  .brand img { width: 100%; max-width: 240px; height: auto; }
  h1 { font-size: 20px; margin: 0 0 4px; color: #1a1a1a; }
  .meta { font-size: 14px; color: #888; margin-bottom: 18px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
  .num { font-size: 26px; font-weight: 700; color: #1a1a1a; }
  .num.green { color: #06a04a; } .num.red { color: #c62828; } .num.grey { color: #888; }
  .cap { font-size: 13px; color: #888; }
  .sub { font-size: 14px; color: #666; margin-top: 12px; text-align: center; }
  .sec { font-size: 16px; color: #666; margin: 24px 0 10px; font-weight: 600; }
  .grp { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 8px; overflow: hidden; }
  .grp summary { padding: 12px 14px; cursor: pointer; font-weight: 600; list-style: none; display: flex; align-items: baseline; gap: 8px; }
  .grp summary::-webkit-details-marker { display: none; }
  .grp summary::before { content: '▸'; color: #bbb; font-size: 13px; transition: transform .15s; }
  .grp[open] summary::before { transform: rotate(90deg); }
  .grp .cnt { color: #888; font-weight: 400; font-size: 14px; }
  .grp .body { padding: 0 14px 12px 30px; }
  .names { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 15px; color: #444; }
  .p { padding: 4px 0; border-bottom: 1px solid #f2f2f2; }
  .p:last-child { border-bottom: none; }
  .p .n { font-weight: 600; }
  .p .att { font-size: 12px; padding: 1px 7px; border-radius: 10px; margin-left: 8px; }
  .att-y { background: #e6f9ee; color: #1a7d44; }
  .att-n { background: #fdecea; color: #b71c1c; }
  .p .op { font-size: 14px; color: #444; display: block; margin-top: 2px; }
  .empty { text-align: center; color: #888; padding: 30px 0; font-size: 15px; }
  /* tabs */
  .tabs { display: flex; gap: 8px; margin: 0 0 16px; }
  .tabs button { flex: 1; padding: 10px 0; font-size: 15px; font-weight: 600; color: #666;
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; cursor: pointer; }
  .tabs button.on { background: #1a5c3a; border-color: #1a5c3a; color: #fff; }
  /* 活動管理 */
  .fld { margin-bottom: 12px; }
  .fld label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  .fld input, .fld textarea { width: 100%; font-size: 16px; padding: 9px 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
  .fld textarea { min-height: 56px; resize: vertical; }
  .btn { display: inline-block; padding: 9px 18px; font-size: 15px; font-weight: 600; border: none; border-radius: 9px; cursor: pointer; }
  .btn-pri { background: #1a5c3a; color: #fff; width: 100%; }
  .btn-sm { padding: 5px 12px; font-size: 13px; background: #f1f1f1; color: #333; margin: 4px 6px 0 0; }
  .btn-sm.warn { background: #fdecea; color: #b71c1c; }
  .act-h { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .act-h .nm { font-weight: 700; font-size: 16px; }
  .st { font-size: 12px; padding: 1px 8px; border-radius: 10px; }
  .st-open { background: #e6f9ee; color: #1a7d44; } .st-closed { background: #eee; color: #777; } .st-due { background: #fff3e0; color: #b26a00; }
  .act-meta { font-size: 13px; color: #888; margin-top: 2px; }
  .msg { font-size: 14px; margin-top: 8px; min-height: 1em; }
  .msg.ok { color: #1a7d44; } .msg.err { color: #b71c1c; }
  .rep { border-top: 1px solid #f0f0f0; margin-top: 10px; padding-top: 8px; }
  /* 桌次管理 */
  .btnrow { display: flex; gap: 8px; margin-top: 10px; }
  .btnrow .btn { flex: 1; padding: 10px 4px; font-size: 14px; }
  .btn-pri2 { background: #1a5c3a; color: #fff; }
  .btn-up { background: #fff; color: #1a5c3a; border: 2px solid #1a5c3a; }
  .btn-amber { background: #b26a00; color: #fff; }
  .btn-red { background: #c62828; color: #fff; }
  .btn-grey { background: #e8e8e8; color: #777; }
  .pills { display: flex; gap: 6px; margin: 14px 0 10px; }
  .pill { flex: 1; text-align: center; font-size: 13px; font-weight: 600; padding: 7px 0; border-radius: 8px;
    background: #f1f1f1; color: #666; border: 1px solid transparent; cursor: pointer; }
  .pill.on { background: #e6f0ea; color: #1a5c3a; border-color: #9dbfab; }
  .scope { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tile { border: 1px solid #e3e3e3; border-radius: 10px; padding: 8px 4px; text-align: center;
    background: #fafafa; cursor: pointer; }
  .tile b { display: block; font-size: 14px; line-height: 1.3; }
  .tile .c { font-size: 11px; color: #888; }
  .tile.sel { background: #e6f0ea; border: 2px solid #1a5c3a; }
  .tile.dirty { background: #fff3c2; border-color: #e5c65a; }
  .tile.empty0 { color: #bbb; background: #fff; }
  .tile.unit b { font-size: 12.5px; }
  .detail { border: 2px solid #1a5c3a; border-radius: 12px; margin-top: 10px; padding: 10px 14px; background: #fff; }
  .dhead { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .prow { display: flex; align-items: center; gap: 7px; padding: 6px 2px; border-bottom: 1px solid #f2f2f2; font-size: 14px; }
  .prow:last-child { border-bottom: none; }
  .prow .nm { font-weight: 600; min-width: 58px; }
  .prow .ti { font-size: 11px; color: #888; flex: 1; }
  .prow .gname { color: #c00000; font-weight: 600; min-width: 58px; }
  .prow .gtag { font-size: 10.5px; background: #fdecea; color: #b71c1c; border-radius: 8px; padding: 0 6px; }
  .prow .chg { font-size: 10.5px; background: #e5c65a; color: #5d4a00; border-radius: 8px; padding: 0 6px; }
  .prow.chgrow { background: #fff3c2; border-radius: 8px; }
  .prow .tno { font-size: 11px; background: #e6f0ea; color: #1a5c3a; border-radius: 8px; padding: 0 7px; font-weight: 700; }
  .mini { font-size: 11px; color: #1a5c3a; border: 1px solid #cfe3d6; border-radius: 6px; padding: 1px 6px;
    background: #fff; cursor: pointer; }
  .divider { font-size: 11px; color: #bbb; padding: 4px 2px 2px; letter-spacing: .1em; }
  @media (min-width: 768px) {
    body { max-width: 720px; padding: 32px 24px 60px; font-size: 18px; }
    h1 { font-size: 25px; } .num { font-size: 32px; } .cap { font-size: 14px; }
    .card { padding: 26px 30px; } .sec { font-size: 18px; }
  }
</style></head><body>
<div class="brand"><img src="assets/logo-full.svg" alt="日商日本國土開發股份有限公司台灣分公司"></div>
<div class="tabs">
  <button id="tabbtn-stats" class="on" onclick="showTab('stats')">出席統計</button>
  <button id="tabbtn-manage" onclick="showTab('manage')">活動管理</button>
  <button id="tabbtn-tables" onclick="showTab('tables')">桌次管理</button>
  <button id="tabbtn-anniv" onclick="showTab('anniv')">年資里程碑</button>
</div>
<div id="tab-stats">
  <h1 id="title">活動紀錄看板</h1>
  <select id="act-picker" style="width:100%;font-size:15px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;display:none" onchange="loadStats(this.value)"></select>
  <div id="meta" class="meta">載入中…</div>
  <div id="content"><div class="empty">載入中…</div></div>
</div>
<div id="tab-anniv" style="display:none">
  <h1>年資里程碑</h1>
  <div id="anniv-box"><div class="empty">載入中…</div></div>
</div>
<div id="tab-manage" style="display:none">
  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">➕ 新增活動</div>
    <div class="fld"><label>活動名稱（必填）</label><input id="na-name" placeholder="例：2026 尾牙"></div>
    <div class="fld"><label>調查截止日（必填，系統自動收到當天 23:59）</label><input id="na-deadline" type="date"></div>
    <div class="fld"><label>活動日期（選填，顯示在問卷上）</label><input id="na-event" type="date"></div>
    <div class="fld"><label>說明文字（選填，顯示在問卷卡片上）</label><textarea id="na-q" placeholder="例：請於截止日前回覆出席意願"></textarea></div>
    <button class="btn btn-pri" onclick="createAct()">建立活動（狀態自動＝開放）</button>
    <div id="na-msg" class="msg"></div>
  </div>
  <div class="sec">活動列表</div>
  <div id="act-list"><div class="empty">載入中…</div></div>
</div>
<div id="tab-tables" style="display:none">
  <h1>桌次管理</h1>
  <div class="fld"><label>活動（切歷史場次可參考前次資料）</label>
    <select id="ti-act" style="width:100%;font-size:15px;padding:8px 10px;border:1px solid #ddd;border-radius:8px" onchange="loadSeating()"></select></div>

  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">🎩 來賓名單 <span id="g-sum" style="color:#888;font-weight:400;font-size:14px"></span></div>
    <div class="btnrow"><button class="btn btn-up" onclick="document.getElementById('g-file').click()">⬆ 上傳</button>
      <button class="btn btn-pri2" onclick="dlGuestFile()">⬇ 下載</button></div>
    <input type="file" id="g-file" accept=".xlsx,.xls" style="display:none" onchange="upGuests(this)">
    <div id="gl-msg" class="msg"></div>
  </div>

  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">🪑 座位表</div>
    <div class="btnrow"><button class="btn btn-pri2" onclick="dlSeatingFile()">⬇ 排位用檔</button>
      <button class="btn btn-up" onclick="document.getElementById('s-file').click()">⬆ 排位結果</button></div>
    <input type="file" id="s-file" accept=".xlsx,.xls" style="display:none" onchange="upSeating(this)">
    <div class="pills"><button class="pill on" id="pv-table" onclick="setSeatView('table')">依桌次</button>
      <button class="pill" id="pv-unit" onclick="setSeatView('unit')">依單位</button></div>
    <div id="scope-row" class="scope"><span style="font-size:13px;color:#666">顯示</span>
      <select id="seat-scope" onchange="renderBoard()" style="flex:1;border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:13.5px">
        <option value="seated">已排桌</option><option value="unseated">未排桌</option></select></div>
    <div id="seat-board"><div class="empty">載入中…</div></div>
    <div id="seat-detail"></div>
    <div class="btnrow"><button class="btn btn-pri2" onclick="dlFormal()">⬇ 正式座位表</button>
      <button class="btn" id="pub-btn" onclick="seatPublish()">發佈桌次</button></div>
    <div id="sm-msg" class="msg"></div>
  </div>

  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">🔳 員工 QR</div>
    <div class="btnrow"><button class="btn btn-pri2" onclick="dlAllQr()">⬇ 批次下載（確認參加者）</button></div>
    <div style="font-size:12px;color:#888;margin-top:6px">ZIP・檔名 單位_姓名.png；單獨一張＝座位表各列的「⬇QR」。</div>
    <div id="qr-msg" class="msg"></div>
  </div>

  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">📥 員工名冊</div>
    <div class="btnrow"><button class="btn btn-pri2" onclick="downloadRoster()">⬇ 單位總表</button>
      <button class="btn btn-pri2" onclick="downloadRosterFlat()">⬇ 逐人明細</button></div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:400;color:#555;font-size:14px">
      <input type="checkbox" id="s-dl-leavers" style="width:auto;margin:0">列出離職同仁（僅逐人明細適用）
    </label>
    <div id="s-dl-msg" class="msg"></div>
  </div>
</div>
<script src="assets/roster-wide.js"></script>
<script src="assets/roster-dl.js"></script>
<script src="assets/anniv.js"></script>
<script src="assets/seating.js"></script>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbxaDoA_7aOW325p8165VegSqdRL8gRhfTEMfjosdh1A0T4rmzj4Pl7F3k5PToe2po-xtg/exec';
function q(k){var m=location.search.match(new RegExp('[?&]'+k+'=([^&]+)'));return m?decodeURIComponent(m[1]):'';}
// 管理者專屬跨看板切換（只有洪炫佑的 token 顯示；受眾分離維持：佳岑/雅慧看不到）
function showAdminSwitch(who){
  if(who!=='洪炫佑'||document.getElementById('adm-switch'))return;
  var a=document.createElement('a');
  a.id='adm-switch';a.textContent='⇄ 人事異動看板';
  a.href='board.html?t='+encodeURIComponent(q('t'));
  a.style.cssText='position:fixed;top:10px;right:10px;z-index:99;background:#fff;border:1px solid #ddd;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#333;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,.12)';
  a.addEventListener('click',function(e){e.preventDefault();location.href=a.href;}); // iOS standalone：<a> 會彈內嵌 Safari，JS 導頁留在 App 內
  document.body.appendChild(a);
}
function jsonp(action,params){return new Promise(function(res){
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  var qs=Object.keys(params||{}).filter(function(k){return params[k]!=='';}).map(function(k){return '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('');
  var s=document.createElement('script');
  s.src=GAS_URL+'?action='+encodeURIComponent(action)+qs+'&callback='+cb;
  var timer=setTimeout(function(){res({ok:false,msg:'連線逾時（伺服器喚醒中），請重新整理再試。'});cleanup();},15000);
  s.onerror=function(){res({ok:false,msg:'連線失敗，請重新整理。'});cleanup();};
  function cleanup(){clearTimeout(timer);window[cb]=function(){};s.remove();}
  window[cb]=function(d){res(d);cleanup();};
  document.body.appendChild(s);});}
function esc(s){return (s==null?'':s).toString().replace(/</g,'&lt;');}

// 依單位收納（保留原順序）；bodyFn(items) 決定每組內容。單位旁顯示人數。
function groupHtml(arr, bodyFn){
  if(!arr.length) return '<div class="empty">（無）</div>';
  var m={},order=[];
  arr.forEach(function(o){if(!m[o.unit]){m[o.unit]=[];order.push(o.unit);}m[o.unit].push(o);});
  return order.map(function(u){
    return '<details class="grp"><summary>'+esc(u)+'<span class="cnt">'+m[u].length+' 人</span></summary><div class="body">'+bodyFn(m[u])+'</div></details>';
  }).join('');
}
// 純名字（橫排流式）
function listHtml(arr){
  return groupHtml(arr, function(items){
    return '<div class="names">'+items.map(function(o){return '<span>'+esc(o.name)+'</span>';}).join('')+'</div>';
  });
}
// 意見清單：每人一列，姓名＋參加/不參加標記＋意見
function opinionsHtml(arr){
  return groupHtml(arr, function(items){
    return items.map(function(o){
      var att=o.attend==='參加' ? '<span class="att att-y">參加</span>' : '<span class="att att-n">不參加</span>';
      return '<div class="p"><span class="n">'+esc(o.name)+'</span>'+att+'<span class="op">'+esc(o.opinion)+'</span></div>';
    }).join('');
  });
}

// ── 分頁切換（活動管理 lazy load）──────────────────────────────────────────
var manageLoaded=false;
function showTab(t){
  ['stats','manage','tables','anniv'].forEach(function(k){
    document.getElementById('tab-'+k).style.display = t===k?'':'none';
    document.getElementById('tabbtn-'+k).className = t===k?'on':'';
  });
  if(t==='manage'&&!manageLoaded){manageLoaded=true;loadActs();}
  if(t==='tables'&&!tablesLoaded){tablesLoaded=true;loadTablesTab();}
}
var tablesLoaded=false;
function setMsg(id,text,cls){var el=document.getElementById(id);el.textContent=text;el.className='msg '+(cls||'');}

// ── 活動管理 ──────────────────────────────────────────────────────────────
function loadActs(){
  var box=document.getElementById('act-list');
  box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('listActivities',{token:q('t')}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">還沒有活動</div>';return;}
    box.innerHTML=r.rows.slice().reverse().map(actCard).join('');
  });
}

// ── 桌次管理分頁 ────────────────────────────────────────────────────────
var SB = null;          // getSeatingBoard 結果
var seatView = 'table'; // table | unit
var seatSel = null;     // 選中的桌/單位

function loadTablesTab(){
  jsonp('listActivities',{token:q('t')}).then(function(r){
    if(!r||!r.ok){document.getElementById('seat-board').innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    var sel=document.getElementById('ti-act');
    sel.innerHTML=r.rows.slice().reverse().map(function(a){
      return '<option value="'+esc(a.id)+'">'+esc(a.name)+'（回覆 '+a.replies+'）</option>';}).join('');
    loadSeating();
  });
}
function actId(){return document.getElementById('ti-act').value;}

function loadSeating(){
  var id=actId();
  if(!id)return;
  document.getElementById('seat-board').innerHTML='<div class="empty">載入中…</div>';
  document.getElementById('seat-detail').innerHTML='';
  jsonp('getSeatingBoard',{token:q('t'),actId:id}).then(function(r){
    if(!r||!r.ok){document.getElementById('seat-board').innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    SB=r; seatSel=null;
    document.getElementById('g-sum').textContent='共 '+r.guestVendors+' 家・'+r.guestSeats+' 人';
    var b=document.getElementById('pub-btn');
    if(r.pubState==='none'){b.className='btn btn-amber';b.textContent='發佈桌次';}
    else if(r.pubState==='clean'){b.className='btn btn-grey';b.textContent='已發佈';}
    else {b.className='btn btn-red';b.textContent='重新發佈';}
    renderBoard();
  });
}
function setSeatView(v){
  seatView=v; seatSel=null;
  document.getElementById('pv-table').className='pill'+(v==='table'?' on':'');
  document.getElementById('pv-unit').className='pill'+(v==='unit'?' on':'');
  document.getElementById('scope-row').style.display=(v==='table')?'':'none';
  renderBoard();
}
function tableKeys_(seats){
  var ks=[];seats.forEach(function(s){var t=String(s.table||'');if(t&&ks.indexOf(t)<0)ks.push(t);});
  ks.sort(function(a,b){var na=parseFloat(a),nb=parseFloat(b);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;if(!isNaN(na))return -1;if(!isNaN(nb))return 1;return a<b?-1:1;});
  return ks;
}
function renderBoard(){
  if(!SB)return;
  var box=document.getElementById('seat-board'),h='';
  if(seatView==='table'){
    var scope=document.getElementById('seat-scope').value;
    if(scope==='unseated'){
      var un=SB.seats.filter(function(s){return !String(s.table||'');});
      box.innerHTML='';
      renderDetail('未排桌（'+un.length+' 人）',un,true);
      return;
    }
    var keys=tableKeys_(SB.seats);
    if(!keys.length){box.innerHTML='<div class="empty">尚未排桌——先下載排位用檔，排好後上傳</div>';
      document.getElementById('seat-detail').innerHTML='';return;}
    h='<div class="board">'+keys.map(function(t){
      var m=SB.seats.filter(function(s){return String(s.table||'')===t;});
      var dirty=m.some(function(s){return s.changed;});
      return '<div class="tile'+(seatSel===t?' sel':'')+(dirty?' dirty':'')+'" onclick="pickTile(\''+esc(t)+'\')">'
        +'<b>'+esc(t)+'桌</b><span class="c">'+m.length+'人'+(dirty?'・有變更':'')+'</span></div>';
    }).join('')+'</div>';
  }else{
    var byU={},uks=[];
    SB.seats.forEach(function(s){

        +'<b>'+esc(u)+'</b><span class="c">'+byU[u].length+'人'+(dirty?'・有變更':'')+'</span></div>';

function pickTile(key,keep){

      var k=(s.kind==='guest')?'🎩來賓':(s.unit||'（未填單位）');return k===key;});

function readSheetAoa_(file){
  return __rdlXlsx().then(function(){
    return new Promise(function(res,rej){
      var fr=new FileReader();
      fr.onload=function(e){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
          res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''}));
        }catch(err){rej(err);}
      };
      fr.onerror=function(){rej(new Error('檔案讀取失敗'));};
      fr.readAsArrayBuffer(file);
    });
  });
}
function upGuests(input){
  var f=input.files&&input.files[0];input.value='';
  if(!f)return;
  if(!actId()){setMsg('gl-msg','請先選活動','err');return;}
  if(SB&&SB.guestSeats>0&&!confirm('上傳會「整批置換」本活動來賓名單，已排定的來賓桌次會被清掉。確定？'))return;
  setMsg('gl-msg','解析中…','');
  readSheetAoa_(f).then(function(aoa){
    var hdr=(aoa[0]||[]).map(function(x){return String(x).trim();});
    var ix=function(n){return hdr.indexOf(n);};
    if(ix('廠商名稱')<0||ix('參加人數')<0){setMsg('gl-msg','格式不符：需有「廠商名稱」「參加人數」欄','err');return;}
    var rows=[];
    for(var r=1;r<aoa.length;r++){
      var g=aoa[r];
      var raw=String(g[ix('廠商名稱')]||'').replace(/[\t\s　]+/g,' ').trim();
      if(!raw)continue;
      var note='',m=raw.match(/^(.*?)[（(]\s*不收費\s*[)）]$/);
      if(m){raw=m[1].trim();note='不收費';}
      var base={owner:String(g[ix('負責人員')]||'').trim(),name:raw,
        type:String(g[ix('工程類別')]||'').trim(),fullName:String(g[ix('公司全名')]||'').replace(/[\t\s　]+/g,' ').trim(),
        contact:String(g[ix('聯絡人')]||'').trim(),phone:String(g[ix('聯繫電話')]||'').trim(),note:note,table:''};
      var n=Number(g[ix('參加人數')])||0;
      if(n<=0)rows.push(Object.assign({seatNo:0},base));
      else for(var k=1;k<=n;k++)rows.push(Object.assign({seatNo:k},base));
    }
    if(!rows.length){setMsg('gl-msg','檔案沒有可匯入的資料','err');return;}
    setMsg('gl-msg','寫入中…（'+rows.length+' 列）','');
    jsonp('clearGuests',{token:q('t'),actId:actId()}).then(function(){
      var chunks=[];var tmp=rows.slice();
      while(tmp.length)chunks.push(tmp.splice(0,8));
      var added=0;
      (function next(){
        var c=chunks.shift();
        if(!c){setMsg('gl-msg','完成 ✅ 已匯入 '+added+' 列','ok');loadSeating();return;}
        jsonp('addGuests',{token:q('t'),actId:actId(),rows:JSON.stringify(c)}).then(function(r){
          if(!r||!r.ok){setMsg('gl-msg',(r&&r.msg)||'寫入失敗','err');return;}
          added+=r.added;next();
        });
      })();
    });
  }).catch(function(e){setMsg('gl-msg',String(e&&e.message||e),'err');});
}
function upSeating(input){
  var f=input.files&&input.files[0];input.value='';
  if(!f)return;
  if(!actId()||!SB){setMsg('sm-msg','請先選活動','err');return;}
  setMsg('sm-msg','解析中…','');
  readSheetAoa_(f).then(function(aoa){
    var parsed=parseSeatingUpload(aoa);
    if(!parsed.length){setMsg('sm-msg','座位格是空的，沒有可匯入的排位結果','err');return;}
    var norm=function(s){return String(s||'').replace(/[\s　]+/g,'');};
    var empIdx={},guestIdx={};
    SB.seats.forEach(function(s){
      if(s.kind==='emp')empIdx[norm(s.name)]=s;
      else (guestIdx[norm(s.name)]=guestIdx[norm(s.name)]||[]).push(s);
    });
    var eWrites=[],gWrites=[],unknown=[],used={};
    parsed.forEach(function(p){
      var k=norm(p.name);
      if(empIdx[k]){eWrites.push({userId:empIdx[k].id,table:p.table});return;}
      if(guestIdx[k]&&guestIdx[k].length){
        used[k]=(used[k]||0);
        var g=guestIdx[k][used[k]];
        if(g){used[k]++;gWrites.push({row:g.id,table:p.table});return;}
      }
      unknown.push(p);
    });
    var msg='比對：同仁 '+eWrites.length+' 人・來賓 '+gWrites.length+' 席'
      +(unknown.length?('・<b style="color:#b71c1c">查無 '+unknown.length+' 筆：'
        +unknown.slice(0,8).map(function(u){return esc(u.name);}).join('、')
        +(unknown.length>8?'…':'')+'</b>（這些會略過）'):'');
    if(!confirm('要寫入嗎？\n同仁 '+eWrites.length+' 人、來賓 '+gWrites.length+' 席'
      +(unknown.length?('\n查無 '+unknown.length+' 筆將略過：'+unknown.slice(0,5).map(function(u){return u.name;}).join('、')):'')))
      { setMsg('sm-msg','已取消','');return; }
    document.getElementById('sm-msg').innerHTML=msg+'　寫入中…';
    var chunks=[];var tmp=eWrites.slice();
    while(tmp.length)chunks.push(tmp.splice(0,20));
    var applied=0;
    (function next(){
      var c=chunks.shift();
      if(!c){
        // 來賓逐筆（席位列定位）
        var gi=0;
        (function nextG(){
          if(gi>=gWrites.length){
            jsonp('clearSeatMarks',{token:q('t'),actId:actId()}).then(function(){
              setMsg('sm-msg','匯入完成 ✅ 同仁 '+applied+' 人・來賓 '+gWrites.length+' 席（此版成為新基準，變更標記已歸零）','ok');
              loadSeating();
            });return;
          }
          var g=gWrites[gi++];
          jsonp('setGuestTable',{token:q('t'),actId:actId(),row:g.row,table:g.table,base:'1'}).then(nextG);
        })();
        return;
      }
      jsonp('setTables',{token:q('t'),actId:actId(),writes:JSON.stringify(c)}).then(function(r){
        if(!r||!r.ok){setMsg('sm-msg',(r&&r.msg)||'寫入失敗','err');return;}
        applied+=r.applied;next();
      });
    })();
  }).catch(function(e){setMsg('sm-msg',String(e&&e.message||e),'err');});
}

/** 黑體＋格線＋置中；opts.redCells=[[r,c]] 上紅字、boldLastRow 末列粗體。 */
function writeSeatXlsx_(aoa,fname,sheetName,opts){
  opts=opts||{};
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  var bd={style:'thin',color:{rgb:'B8B8B8'}};
  var border={top:bd,bottom:bd,left:bd,right:bd};
  var leftIdx=(opts.leftAlign||[]).map(function(h){return aoa[0].indexOf(h);}).filter(function(i){return i>=0;});
  var red={};(opts.redCells||[]).forEach(function(rc){red[rc[0]+','+rc[1]]=1;});
  var widths=[];
  var wlen=function(v){var n=0,t=String(v==null?'':v);for(var i=0;i<t.length;i++)n+=t.charCodeAt(i)>255?2:1;return n;};
  for(var r=0;r<aoa.length;r++){
    for(var c=0;c<(aoa[r]||[]).length;c++){
      widths[c]=Math.max(widths[c]||0,wlen(aoa[r][c]));
      var ref=XLSX.utils.encode_cell({r:r,c:c});
      if(!ws[ref])ws[ref]={t:'s',v:''};
      ws[ref].s={border:border,
        alignment:{horizontal:(leftIdx.indexOf(c)>=0&&r>0)?'left':'center',vertical:'center'},
        font:{name:'Microsoft JhengHei',
          bold:(r===0||(opts.boldLastRow&&r===aoa.length-1))||undefined,
          color:red[r+','+c]?{rgb:'C00000'}:undefined}};
    }
  }
  ws['!cols']=widths.map(function(w){return {wch:Math.min(Math.max(w+2,6),30)};});
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,fname+'_'+__rdlToday().replace(/\//g,'-')+'.xlsx');
}

// ── QR ─────────────────────────────────────────────────────────────────
function __tmLib(src,flag){
  if(window[flag])return Promise.resolve();
  return new Promise(function(res,rej){
    var s=document.createElement('script');s.src=src;s.onload=res;
    s.onerror=function(){rej(new Error('元件載入失敗，請重試'));};
    document.body.appendChild(s);
  });
}
var LOGO_DATA=null;
function __logo(){
  if(LOGO_DATA)return Promise.resolve(LOGO_DATA);
  return fetch('assets/logo-mark.svg').then(function(r){return r.text();}).then(function(t){
    return new Promise(function(res){
      var img=new Image();
      img.onload=function(){LOGO_DATA=img;res(img);};
      img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(t)));
    });
  });
}
/** QR 畫布：中央膠囊＝logo（原比例）＋活動名（與 logo 同寬）＋姓名（大一級），文字灰階。 */
function __qrCanvas(code,name,actName,logo){
  var qr=qrcode(0,'H');qr.addData(code);qr.make();
  var n=qr.getModuleCount(),cell=8,quiet=24,size=n*cell+quiet*2;
  var cv=document.createElement('canvas');cv.width=size;cv.height=size;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#000';
  for(var r=0;r<n;r++)for(var c=0;c<n;c++)if(qr.isDark(r,c))ctx.fillRect(quiet+c*cell,quiet+r*cell,cell,cell);

  var LW=Math.round(size*0.165);                       // logo 寬（原比例縮放）
  var lh=logo?Math.round(LW*(logo.height/logo.width)):Math.round(LW*1.03);
  var FONT=function(px){return '700 '+px+'px -apple-system,"PingFang TC","Noto Sans TC",sans-serif';};
  // 真實墨水寬度（粗體中文的 advance width 會低估）
  var inkW=function(txt,px){
    ctx.font=FONT(px);
    var m=ctx.measureText(txt);
    var l=m.actualBoundingBoxLeft,r=m.actualBoundingBoxRight;
    return (isFinite(l)&&isFinite(r))?(l+r):m.width;
  };
  var BASE=20;
  var sAct=LW/Math.max(inkW(actName,BASE),1);          // 活動名寬＝logo 寬
  var sNm=(LW*1.18)/Math.max(inkW(name,BASE),1);       // 姓名比活動名大一級
  var hAct=BASE*sAct, hNm=BASE*sNm;
  var wAct=LW, wNm=LW*1.18;
  var pad=Math.round(size*0.03), gap=Math.round(size*0.008);
  var capW=Math.ceil(Math.max(LW,wAct,wNm))+pad*2;
  var capH=Math.ceil(lh+gap+hAct+gap+hNm)+pad*2;
  var cx=size/2, cy=size/2, rx=cx-capW/2, ry=cy-capH/2, rr=Math.round(size*0.02);
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(rx+rr,ry);
  ctx.arcTo(rx+capW,ry,rx+capW,ry+capH,rr);
  ctx.arcTo(rx+capW,ry+capH,rx,ry+capH,rr);
  ctx.arcTo(rx,ry+capH,rx,ry,rr);
  ctx.arcTo(rx,ry,rx+capW,ry,rr);
  ctx.closePath();ctx.fill();

  var y=ry+pad;
  if(logo){ctx.drawImage(logo,cx-LW/2,y,LW,lh);y+=lh+gap;}
  ctx.fillStyle='#767676';ctx.textAlign='center';ctx.textBaseline='top';
  [[actName,sAct,hAct],[name,sNm,hNm]].forEach(function(t,i){
    ctx.save();ctx.translate(cx,y);ctx.scale(t[1],t[1]);
    ctx.font=FONT(BASE);ctx.fillText(t[0],0,0);ctx.restore();
    y+=t[2]+(i===0?gap:0);
  });
  return cv;
}
var qrCache={};
function qrRows(){
  var id=actId();
  if(qrCache[id])return Promise.resolve(qrCache[id]);
  return Promise.all([__tmLib('assets/qrcode-gen.js','qrcode'),__logo(),
    jsonp('getCheckinCodes',{token:q('t'),actId:id})]).then(function(rs){
    if(!rs[2]||!rs[2].ok)throw new Error((rs[2]&&rs[2].msg)||'簽發失敗');
    qrCache[id]=rs[2].rows;return rs[2].rows;
  });
}
function findQr(rows,name){
  var norm=function(s){return String(s||'').replace(/[\s　]+/g,'');};
  for(var i=0;i<rows.length;i++)if(norm(rows[i].name)===norm(name))return rows[i];
  return null;
}
function showQr(name){
  qrRows().then(function(rows){
    var p=findQr(rows,name);

    var ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center';
    ov.onclick=function(){ov.remove();};
    var cv=__qrCanvas(p.code,p.name,SB.actName,LOGO_DATA);
    cv.style.cssText='max-width:82vw;max-height:82vh;border-radius:12px;background:#fff';
    ov.appendChild(cv);document.body.appendChild(ov);
  }).catch(function(e){setMsg('sm-msg',String(e&&e.message||e),'err');});
}
function dlOneQr(name){
  qrRows().then(function(rows){
    var p=findQr(rows,name);
    if(!p){setMsg('sm-msg','找不到此人的 QR（未回覆參加？）','err');return;}
    __qrCanvas(p.code,p.name,SB.actName,LOGO_DATA).toBlob(function(b){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(b);a.download=(p.unit||'未分類')+'_'+p.name+'.png';
      a.click();URL.revokeObjectURL(a.href);
      setMsg('sm-msg','已下載 '+p.name+' 的 QR ✅','ok');
    });
  }).catch(function(e){setMsg('sm-msg',String(e&&e.message||e),'err');});
}
function dlAllQr(){
  if(!actId()){setMsg('qr-msg','請先選活動','err');return;}
  setMsg('qr-msg','產生中…','');
  Promise.all([__tmLib('assets/jszip.min.js','JSZip'),qrRows()]).then(function(rs){
    var rows=rs[1];
    if(!rows.length){setMsg('qr-msg','此活動還沒有「參加」的回覆，無 QR 可產。','err');return;}
    var zip=new JSZip(),chain=Promise.resolve();
    rows.forEach(function(p){
      chain=chain.then(function(){
        return new Promise(function(res){
          __qrCanvas(p.code,p.name,SB.actName,LOGO_DATA).toBlob(function(b){
            zip.file((p.unit||'未分類')+'_'+p.name+'.png',b);res();});
        });
      });
    });
    chain.then(function(){return zip.generateAsync({type:'blob'});}).then(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='員工QR_'+SB.actName+'_'+__rdlToday().replace(/\//g,'-')+'.zip';
      a.click();URL.revokeObjectURL(a.href);
      setMsg('qr-msg','已下載 ✅（'+rows.length+' 張）','ok');
    });
  }).catch(function(e){setMsg('qr-msg',String(e&&e.message||e),'err');});
}
var LIFF_URL='https://liff.line.me/2010451233-a781rqsm';
function copyLink(id,btn){
  var url=LIFF_URL+'?act='+encodeURIComponent(id);
  function done(ok){btn.textContent=ok?'✅ 已複製':'複製失敗';setTimeout(function(){btn.textContent='📋 複製問卷網址';},2000);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(function(){done(true);},function(){fallback();});}
  else fallback();
  function fallback(){
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();
    try{done(document.execCommand('copy'));}catch(e){done(false);}ta.remove();
  }
}
function actCard(a){
  var st = a.status==='開放' ? (a.open?'<span class="st st-open">開放中</span>':'<span class="st st-due">已截止</span>')
                             : '<span class="st st-closed">已關閉</span>';
  var btns = '<button class="btn btn-sm" onclick="copyLink(\''+esc(a.id)+'\',this)">📋 複製問卷網址</button>'
    +(a.status==='開放'
      ? '<button class="btn btn-sm warn" onclick="setSt(\''+esc(a.id)+'\',\'關閉\')">關閉填寫</button>'
      : '<button class="btn btn-sm" onclick="setSt(\''+esc(a.id)+'\',\'開放\')">重新開放</button>')
    +'<button class="btn btn-sm" onclick="chgDl(\''+esc(a.id)+'\')">改截止日</button>'
    +'<button class="btn btn-sm" onclick="toggleRep(this,\''+esc(a.id)+'\')">回覆明細（'+a.replies+'）</button>'
    +(a.replies===0?'<button class="btn btn-sm warn" onclick="delAct(\''+esc(a.id)+'\',\''+esc(a.name)+'\')">🗑 刪除</button>':'');
  return '<div class="card" id="act-'+esc(a.id)+'">'
    +'<div class="act-h"><span class="nm">'+esc(a.name)+'</span>'+st+'</div>'
    +'<div class="act-meta">截止 '+esc(a.deadline)+(a.eventDate?'　活動日 '+esc(a.eventDate):'')+'　回覆 '+a.replies+' 筆　<span style="color:#bbb">'+esc(a.id)+'</span></div>'
    +(a.question?'<div class="act-meta">說明：'+esc(a.question)+'</div>':'')
    +(a.replies>0?'<div class="act-meta" style="color:#b26a00">※ 已有 '+a.replies+' 筆回覆，不可刪除（避免回覆資料遺失）；不再使用請按「關閉填寫」</div>':'')
    +'<div>'+btns+'</div><div class="msg" data-msg></div><div class="rep" style="display:none" data-rep></div></div>';
}
function cardMsg(id,text,cls){var c=document.getElementById('act-'+id);if(!c)return;var el=c.querySelector('[data-msg]');el.textContent=text;el.className='msg '+(cls||'');}
function createAct(){
  var name=document.getElementById('na-name').value.trim();
  var dl=document.getElementById('na-deadline').value;
  if(!name){setMsg('na-msg','請填活動名稱','err');return;}
  if(!dl){setMsg('na-msg','請選調查截止日','err');return;}
  setMsg('na-msg','建立中…','');
  jsonp('addActivity',{token:q('t'),name:name,deadlineDate:dl,eventDate:document.getElementById('na-event').value,question:document.getElementById('na-q').value.trim()}).then(function(r){
    if(!r||!r.ok){setMsg('na-msg',(r&&r.msg)||'建立失敗','err');return;}
    setMsg('na-msg','✅ 已建立（'+r.id+'），截止 '+r.deadline,'ok');
    document.getElementById('na-name').value='';document.getElementById('na-q').value='';
    loadActs();
  });
}
function setSt(id,st){
  if(st==='關閉'&&!confirm('確定關閉「'+id+'」的填寫？（之後可重新開放）'))return;
  cardMsg(id,'處理中…','');
  jsonp('setActivityStatus',{token:q('t'),actId:id,status:st}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'失敗','err');return;}
    loadActs();
  });
}
function delAct(id,name){
  if(!confirm('確定刪除「'+name+'」？此活動還沒有任何回覆，刪除後問卷連結即失效。'))return;
  cardMsg(id,'刪除中…','');
  jsonp('deleteActivity',{token:q('t'),actId:id}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'刪除失敗','err');return;}
    loadActs();
  });
}
function chgDl(id){
  var v=prompt('新的調查截止日（YYYY-MM-DD，系統自動收到當天 23:59）：');
  if(!v)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v.trim())){alert('格式要 YYYY-MM-DD，例如 2026-08-15');return;}
  cardMsg(id,'處理中…','');
  jsonp('updateActivity',{token:q('t'),actId:id,deadlineDate:v.trim()}).then(function(r){
    if(!r||!r.ok){cardMsg(id,(r&&r.msg)||'失敗','err');return;}
    loadActs();
  });
}
function toggleRep(btn,id){
  var c=document.getElementById('act-'+id);var box=c.querySelector('[data-rep]');
  if(box.style.display!=='none'){box.style.display='none';return;}
  box.style.display='';box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('getActivityReplies',{token:q('t'),actId:id}).then(function(r){
    if(!r||!r.ok){box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'載入失敗')+'</div>';return;}
    if(!r.rows.length){box.innerHTML='<div class="empty">還沒有回覆</div>';return;}
    // 依單位收納（同出席統計），單位旁顯示人數
    box.innerHTML=groupHtml(r.rows,function(items){
      return items.map(function(x){
        var att=x.attend==='參加'?'<span class="att att-y">參加</span>':'<span class="att att-n">'+esc(x.attend||'—')+'</span>';
        return '<div class="p"><span class="n">'+esc(x.name)+'</span>'+att
          +(x.diet?'<span style="font-size:13px;color:#666">　'+esc(x.diet)+'</span>':'')
          +'<span style="font-size:12px;color:#bbb">　'+esc(x.time)+'</span>'
          +(x.opinion?'<span class="op">'+esc(x.opinion)+'</span>':'')+'</div>';
      }).join('');
    });
  });
}

// 活動切換下拉（歷史場次也能回看統計）
jsonp('listActivities',{token:q('t')}).then(function(r){
  if(!r||!r.ok||!r.rows.length)return;
  var sel=document.getElementById('act-picker');
  sel.innerHTML=r.rows.slice().reverse().map(function(a){
    var st=a.status==='開放'?(a.open?'開放中':'已截止'):'已關閉';
    return '<option value="'+esc(a.id)+'">'+esc(a.name)+'（'+st+'・回覆 '+a.replies+'）</option>';
  }).join('');
  if(window._curAct)sel.value=window._curAct;
  sel.style.display='';
});

function loadStats(act){
  var meta=document.getElementById('meta'), box=document.getElementById('content');
  meta.textContent='載入中…';box.innerHTML='<div class="empty">載入中…</div>';
  jsonp('getActivityStats',{token:q('t'),act:act||''}).then(function(r){
  if(!r||!r.ok){meta.textContent='';box.innerHTML='<div class="empty">'+esc((r&&r.msg)||'連結無效或已失效。')+'</div>';return;}
  var a=r.activity, c=r.counts;
  window._curAct=a.id||'';
  var sel=document.getElementById('act-picker');
  if(sel.options.length&&a.id)sel.value=a.id;
  document.getElementById('title').textContent=a.name||'活動紀錄看板';
  meta.textContent=[a.eventDate?'活動日期：'+a.eventDate:'', a.deadlineText?'回覆截止：'+a.deadlineText:'', '狀態：'+a.status, '（'+r.who+'）'].filter(Boolean).join('　');
  showAdminSwitch(r.who);
  var noReply=c.boundNoReply+c.notBound;
  box.innerHTML=
    '<div class="card"><div class="grid">'
      +'<div><div class="num green">'+c.attend+'</div><div class="cap">參加</div></div>'
      +'<div><div class="num red">'+c.absent+'</div><div class="cap">不參加</div></div>'
      +'<div><div class="num grey">'+noReply+'</div><div class="cap">未填</div></div>'
    +'</div><div class="sub">全員 '+c.total+'・已回覆 '+c.replied+'・葷 '+c.meat+'／素 '+c.veg+'</div></div>'
    +'<div class="sec">意見（'+(r.opinions||[]).length+'）— 參加與不參加者填的意見</div>'+opinionsHtml(r.opinions||[])
    +'<div class="sec">不參加（'+c.absent+'）</div>'+listHtml(r.absentList)
    +'<div class="sec">已綁定未填（'+c.boundNoReply+'）— 催填問卷連結即可</div>'+listHtml(r.boundNoReply)
    +'<div class="sec">未綁定（'+c.notBound+'）— 要先完成身分綁定才能填</div>'+listHtml(r.notBound);
  });
}
loadStats(q('act'));
annivInit(jsonp, q('t'), {emptyText:'今年度沒有年資逢 5 週年的同仁。'});   // 年資里程碑分頁
